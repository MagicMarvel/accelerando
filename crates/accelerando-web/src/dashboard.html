<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accelerando — backtest dashboard</title>
<style>
  :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background:#f6f7f9; color:#111827; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:grid; grid-template-rows:auto auto 1fr auto; overflow:hidden; }
  header { padding:10px 16px; background:#0f172a; color:#fff; display:flex; align-items:baseline; gap:12px; }
  header .title { font-size:16px; font-weight:800; letter-spacing:.3px; }
  header .tag { font-size:12px; color:#94a3b8; }
  .cards { display:flex; gap:10px; flex-wrap:wrap; padding:10px 16px; background:#fff; border-bottom:1px solid #e2e8f0; }
  .card { min-width:120px; padding:8px 12px; border:1px solid #e5e7eb; border-radius:8px; background:#fbfcfe; }
  .card .k { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:.4px; }
  .card .v { font-size:17px; font-weight:700; margin-top:2px; }
  .pos { color:#0f8b69; } .neg { color:#d65b55; }
  .toolbar { display:flex; align-items:center; gap:8px; padding:6px 16px; background:#fff; border-bottom:1px solid #e2e8f0; }
  button { height:28px; min-width:32px; border:1px solid #c5ccd6; border-radius:6px; background:#fff; cursor:pointer; font-size:14px; }
  button:hover { background:#eef2f7; }
  .charts { position:relative; display:grid; grid-template-rows:1fr 220px; }
  canvas { display:block; width:100%; height:100%; background:#fbfcfe; cursor:grab; }
  canvas.dragging { cursor:grabbing; }
  .status { margin-left:auto; font-size:12px; color:#475569; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  footer { padding:4px 16px; font-size:11px; color:#94a3b8; background:#0f172a; }
</style>
</head>
<body>
<header>
  <span class="title">ACCELERANDO</span>
  <span class="tag">the world has been accelerated — footprint backtest</span>
  <span class="status" id="status"></span>
</header>
<div class="cards" id="cards"></div>
<div class="toolbar">
  <button id="zoomIn" title="Zoom in">+</button>
  <button id="zoomOut" title="Zoom out">−</button>
  <button id="reset" title="Reset view">Reset</button>
  <label style="font-size:12px;color:#374151;display:inline-flex;gap:6px;align-items:center;">
    <input type="checkbox" id="showBands" checked> regime bands</label>
  <label style="font-size:12px;color:#374151;display:inline-flex;gap:6px;align-items:center;">
    <input type="checkbox" id="showTrades" checked> trades</label>
  <span class="status" id="range"></span>
</div>
<div class="charts">
  <canvas id="price"></canvas>
  <canvas id="equity"></canvas>
</div>
<footer>Accelerando dashboard · data served locally · drag to pan, wheel to zoom</footer>
<script>
const COLORS = { up:"#0f8b69", down:"#d65b55", grid:"#e2e8f0", axis:"#475569" };
let DATA = null, fps = [], eq = [], trades = [];
let barsPerView = 300, start = 0, hover = null, drag = null;
let showBands = true, showTrades = true;
const price = document.getElementById("price"), pctx = price.getContext("2d");
const equity = document.getElementById("equity"), ectx = equity.getContext("2d");

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function fmt(n, d=2){ return (n===null||n===undefined||!isFinite(n)) ? "–" : Number(n).toLocaleString(undefined,{maximumFractionDigits:d, minimumFractionDigits:d}); }
function fmtTs(ns){ const ms = Number(ns)/1e6; return new Date(ms).toLocaleString(); }
function signClass(n){ return n>=0 ? "pos":"neg"; }

async function load(){
  DATA = await (await fetch("result.json")).json();
  fps = DATA.footprints || [];
  eq = DATA.equity || [];
  trades = DATA.trades || [];
  renderCards(DATA.metrics);
  barsPerView = Math.min(300, Math.max(20, fps.length));
  start = Math.max(0, fps.length - barsPerView);
  // Precompute footprint index for each trade timestamp.
  for (const t of trades){ t._ei = idxForTs(t.entry_ts_ns); t._xi = idxForTs(t.exit_ts_ns); }
  resize();
}

function idxForTs(ns){
  const x = Number(ns); let lo=0, hi=fps.length-1, best=0;
  while(lo<=hi){ const m=(lo+hi)>>1; if(Number(fps[m].ts_last_ns) <= x){ best=m; lo=m+1; } else hi=m-1; }
  return best;
}

function renderCards(m){
  if(!m) return;
  const cards = [
    ["Net PnL", "$"+fmt(m.net_pnl), signClass(m.net_pnl)],
    ["Return", fmt(m.return_pct)+"%", signClass(m.return_pct)],
    ["Trades", String(m.trades), ""],
    ["Win rate", fmt(m.win_rate*100,1)+"%", ""],
    ["Profit factor", fmt(m.profit_factor), signClass(m.profit_factor-1)],
    ["Expectancy", "$"+fmt(m.expectancy), signClass(m.expectancy)],
    ["Sharpe", fmt(m.sharpe), signClass(m.sharpe)],
    ["Sortino", fmt(m.sortino), signClass(m.sortino)],
    ["Max DD", "$"+fmt(m.max_drawdown), "neg"],
    ["Max DD %", fmt(m.max_drawdown_pct,1)+"%", "neg"],
  ];
  document.getElementById("cards").innerHTML = cards.map(([k,v,c])=>
    `<div class="card"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join("");
}

function setBarsPerView(next, anchor=1){
  const old = barsPerView;
  next = Math.round(clamp(next, 20, Math.max(20, fps.length)));
  const a = start + old*anchor;
  barsPerView = next;
  start = clamp(Math.round(a - barsPerView*anchor), 0, Math.max(0, fps.length - barsPerView));
  draw();
}

function resize(){
  for(const c of [price, equity]){
    const r = c.getBoundingClientRect(); const dpr = window.devicePixelRatio||1;
    c.width = Math.max(1, Math.floor(r.width*dpr)); c.height = Math.max(1, Math.floor(r.height*dpr));
    c.getContext("2d").setTransform(dpr,0,0,dpr,0,0);
  }
  draw();
}

function viewRange(){
  const end = Math.min(fps.length, start+barsPerView);
  return [start, end];
}

function drawPrice(){
  const W = price.clientWidth, H = price.clientHeight;
  pctx.clearRect(0,0,W,H); pctx.fillStyle="#fbfcfe"; pctx.fillRect(0,0,W,H);
  if(!fps.length) return;
  const [s,e] = viewRange(); const vis = fps.slice(s,e);
  const L=64, R=16, T=14, B=22;
  const pw = Math.max(1, W-L-R), ph = Math.max(1, H-T-B);
  let lo=Infinity, hi=-Infinity;
  for(const b of vis){ lo=Math.min(lo,b.low); hi=Math.max(hi,b.high); }
  const pad=Math.max(0.25,(hi-lo)*0.06); lo-=pad; hi+=pad;
  const y = p => T + (hi-p)/(hi-lo)*ph;
  const xStep = pw/Math.max(1,vis.length);
  const cw = Math.max(1, Math.min(16, xStep*0.7));

  // regime background bands
  if(showBands){
    let i=0;
    while(i<vis.length){
      const band = (vis[i].plots||[]).find(p=>p.kind==="BackgroundBand");
      const col = band? band.color : null;
      let j=i+1;
      const same = k => { const bb=(vis[k].plots||[]).find(p=>p.kind==="BackgroundBand"); return (bb?bb.color:null)===col; };
      while(j<vis.length && same(j)) j++;
      if(col){ pctx.fillStyle=col; pctx.fillRect(L+i*xStep, T, (j-i)*xStep, ph); }
      i=j;
    }
  }
  // grid + price axis
  pctx.strokeStyle=COLORS.grid; pctx.fillStyle=COLORS.axis; pctx.font="11px Segoe UI, Arial"; pctx.lineWidth=1;
  for(let i=0;i<=6;i++){ const yy=T+ph*i/6, pr=hi-(hi-lo)*i/6;
    pctx.beginPath(); pctx.moveTo(L,yy); pctx.lineTo(W-R,yy); pctx.stroke();
    pctx.fillText(pr.toFixed(2), 6, yy+4); }
  // candles
  for(let i=0;i<vis.length;i++){ const b=vis[i]; const x=L+i*xStep+xStep/2;
    const c = b.close>=b.open?COLORS.up:COLORS.down;
    pctx.strokeStyle=c; pctx.fillStyle=c;
    pctx.beginPath(); pctx.moveTo(x,y(b.high)); pctx.lineTo(x,y(b.low)); pctx.stroke();
    const oy=y(b.open), cy=y(b.close);
    pctx.fillRect(x-cw/2, Math.min(oy,cy), cw, Math.max(1,Math.abs(oy-cy))); }
  // trade markers
  if(showTrades){
    for(const t of trades){
      if(t._xi < s || t._ei > e) continue;
      const xi = clamp(t._ei - s, 0, vis.length-1), xo = clamp(t._xi - s, 0, vis.length-1);
      const ex = L+xi*xStep+xStep/2, xx = L+xo*xStep+xStep/2;
      const ey = y(t.entry_px), xy_ = y(t.exit_px);
      // TradingView / ATAS-style position tool. Colorblind-safe palette: BLUE = reward/win,
      // ORANGE = risk/loss (no red/green). Works for long and short alike, since target/stop
      // are real prices (a short's target sits below its entry).
      const REW="37,99,235", RISK="232,131,42";        // blue / orange
      const outcome = t.pnl>=0 ? REW : RISK;
      const bx0 = ex, bx1 = Math.max(xx, ex+4), bw = bx1-bx0;
      if(t.target!=null){ const ty=y(t.target);
        pctx.fillStyle=`rgba(${REW},0.14)`;
        pctx.fillRect(bx0, Math.min(ey,ty), bw, Math.max(1,Math.abs(ey-ty)));
        pctx.strokeStyle=`rgba(${REW},0.9)`; pctx.lineWidth=1;
        pctx.beginPath(); pctx.moveTo(bx0,ty); pctx.lineTo(bx1,ty); pctx.stroke(); }
      if(t.stop!=null){ const sy=y(t.stop);
        pctx.fillStyle=`rgba(${RISK},0.16)`;
        pctx.fillRect(bx0, Math.min(ey,sy), bw, Math.max(1,Math.abs(ey-sy)));
        pctx.strokeStyle=`rgba(${RISK},0.95)`; pctx.lineWidth=1;
        pctx.beginPath(); pctx.moveTo(bx0,sy); pctx.lineTo(bx1,sy); pctx.stroke(); }
      // entry baseline (anchor) — neutral slate
      pctx.strokeStyle="rgba(45,55,72,0.9)"; pctx.lineWidth=1;
      pctx.beginPath(); pctx.moveTo(bx0,ey); pctx.lineTo(bx1,ey); pctx.stroke();
      // dashed connector entry → exit, colored by outcome
      pctx.strokeStyle=`rgba(${outcome},0.85)`;
      pctx.setLineDash([4,3]); pctx.beginPath(); pctx.moveTo(ex,ey); pctx.lineTo(xx,xy_); pctx.stroke(); pctx.setLineDash([]);
      // entry triangle — direction shown by orientation, neutral fill
      pctx.fillStyle = "rgba(45,55,72,0.95)";
      pctx.beginPath();
      if(t.dir>0){ pctx.moveTo(ex,ey-7); pctx.lineTo(ex-5,ey+2); pctx.lineTo(ex+5,ey+2);}
      else { pctx.moveTo(ex,ey+7); pctx.lineTo(ex-5,ey-2); pctx.lineTo(ex+5,ey-2);}
      pctx.closePath(); pctx.fill();
      // exit cross, colored by outcome
      pctx.strokeStyle = `rgba(${outcome},1)`; pctx.lineWidth=2;
      pctx.beginPath(); pctx.moveTo(xx-4,xy_-4); pctx.lineTo(xx+4,xy_+4);
      pctx.moveTo(xx+4,xy_-4); pctx.lineTo(xx-4,xy_+4); pctx.stroke(); pctx.lineWidth=1;
    }
  }
  pctx.strokeStyle="#9aa4b2"; pctx.strokeRect(L,T,pw,ph);

  // hover crosshair + status
  if(hover && hover.canvas==="price"){
    const idx = clamp(Math.floor((hover.x-L)/xStep),0,vis.length-1);
    const b = vis[idx]; if(b){
      const x=L+idx*xStep+xStep/2;
      pctx.strokeStyle="#111827"; pctx.beginPath(); pctx.moveTo(x,T); pctx.lineTo(x,T+ph); pctx.stroke();
      const reg = b.tags? (b.tags.regime||"") : "";
      document.getElementById("status").textContent =
        `${s+idx+1}/${fps.length}  ${fmtTs(b.ts_last_ns)}  O ${b.open.toFixed(2)} H ${b.high.toFixed(2)} L ${b.low.toFixed(2)} C ${b.close.toFixed(2)}  Δ ${fmt(b.delta,0)}  ${reg}`;
    }
  }
  document.getElementById("range").textContent = `bars ${s+1}-${e} / ${fps.length}`;
}

function drawEquity(){
  const W=equity.clientWidth, H=equity.clientHeight;
  ectx.clearRect(0,0,W,H); ectx.fillStyle="#fff"; ectx.fillRect(0,0,W,H);
  if(!eq.length) return;
  const [s,e]=viewRange();
  const vis = eq.slice(Math.min(s,eq.length-1), Math.min(e,eq.length));
  const L=64,R=16,T=12,B=18; const pw=Math.max(1,W-L-R), ph=Math.max(1,H-T-B);
  let lo=Infinity,hi=-Infinity;
  for(const p of vis){ lo=Math.min(lo,p.equity); hi=Math.max(hi,p.equity); }
  if(!(isFinite(lo)&&isFinite(hi))||lo===hi){ lo-=1; hi+=1; }
  const pad=(hi-lo)*0.08; lo-=pad; hi+=pad;
  const y=v=>T+(hi-v)/(hi-lo)*ph; const xStep=pw/Math.max(1,vis.length);
  // zero/ start equity reference
  const startEq = DATA.metrics? DATA.metrics.starting_equity : (vis[0]?vis[0].equity:0);
  ectx.strokeStyle=COLORS.grid; ectx.fillStyle=COLORS.axis; ectx.font="11px Segoe UI, Arial";
  for(let i=0;i<=3;i++){ const yy=T+ph*i/3, vv=hi-(hi-lo)*i/3;
    ectx.beginPath(); ectx.moveTo(L,yy); ectx.lineTo(W-R,yy); ectx.stroke();
    ectx.fillText("$"+vv.toFixed(0),6,yy+4); }
  if(startEq>=lo && startEq<=hi){ ectx.strokeStyle="#cbd5e1"; ectx.setLineDash([4,4]);
    ectx.beginPath(); ectx.moveTo(L,y(startEq)); ectx.lineTo(W-R,y(startEq)); ectx.stroke(); ectx.setLineDash([]); }
  // drawdown shading
  ectx.fillStyle="rgba(214,91,85,0.12)";
  ectx.beginPath(); ectx.moveTo(L, y(startEq));
  for(let i=0;i<vis.length;i++){ ectx.lineTo(L+i*xStep, y(vis[i].equity+ (vis[i].drawdown<0?vis[i].drawdown:0)*0)); }
  // equity line
  ectx.strokeStyle="#2563eb"; ectx.lineWidth=1.6; ectx.beginPath();
  for(let i=0;i<vis.length;i++){ const x=L+i*xStep, yy=y(vis[i].equity); i? ectx.lineTo(x,yy):ectx.moveTo(x,yy); }
  ectx.stroke(); ectx.lineWidth=1;
  ectx.fillStyle="#64748b"; ectx.fillText("equity", L+4, T+12);
  ectx.strokeStyle="#9aa4b2"; ectx.strokeRect(L,T,pw,ph);
}

function draw(){ drawPrice(); drawEquity(); }

function attach(canvas, name){
  canvas.addEventListener("wheel", ev=>{ ev.preventDefault();
    const r=canvas.getBoundingClientRect();
    const ratio=clamp((ev.clientX-r.left-64)/Math.max(1,r.width-80),0,1);
    setBarsPerView(barsPerView*(ev.deltaY<0?0.82:1.22), ratio);
  }, {passive:false});
  canvas.addEventListener("mousedown", ev=>{ drag={x:ev.clientX, start}; canvas.classList.add("dragging"); });
  canvas.addEventListener("mousemove", ev=>{ const r=canvas.getBoundingClientRect();
    hover={canvas:name, x:ev.clientX-r.left, y:ev.clientY-r.top};
    if(drag){ const pw=Math.max(1,r.width-80); const d=Math.round((drag.x-ev.clientX)/pw*barsPerView);
      start=clamp(drag.start+d,0,Math.max(0,fps.length-barsPerView)); }
    draw();
  });
  canvas.addEventListener("mouseleave", ()=>{ hover=null; draw(); });
}
window.addEventListener("mouseup", ()=>{ drag=null; price.classList.remove("dragging"); equity.classList.remove("dragging"); });
attach(price,"price"); attach(equity,"equity");
document.getElementById("zoomIn").onclick=()=>setBarsPerView(barsPerView*0.75,0.5);
document.getElementById("zoomOut").onclick=()=>setBarsPerView(barsPerView*1.35,0.5);
document.getElementById("reset").onclick=()=>{ barsPerView=Math.min(300,Math.max(20,fps.length)); start=Math.max(0,fps.length-barsPerView); draw(); };
document.getElementById("showBands").onchange=e=>{ showBands=e.target.checked; draw(); };
document.getElementById("showTrades").onchange=e=>{ showTrades=e.target.checked; draw(); };
window.addEventListener("resize", resize);
load();
</script>
</body>
</html>
