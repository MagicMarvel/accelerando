<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accelerando — backtest studio</title>
<style>
  :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background:#f6f7f9; color:#111827; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
  header { padding:10px 16px; background:#0f172a; color:#fff; display:flex; align-items:baseline; gap:12px; }
  header .title { font-size:16px; font-weight:800; letter-spacing:.3px; }
  header .brand-home { color:#fff; text-decoration:none; flex:0 0 auto; }
  header .brand-home:hover { text-decoration:underline; }
  header .tag { font-size:12px; color:#94a3b8; }
  header .status { margin-left:auto; font-size:12px; color:#cbd5e1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:55vw;}
  .main { display:grid; grid-template-columns:360px 1fr; min-height:0; }
  body.viewer .main { grid-template-columns:1fr; }
  body.viewer .side { display:none; }
  .side { border-right:1px solid #e2e8f0; background:#fff; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
  .panel { border:1px solid #e5e7eb; border-radius:10px; background:#fbfcfe; }
  .panel > h3 { margin:0; padding:8px 12px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:#475569; border-bottom:1px solid #eef2f7; }
  .panel .body { padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  .runbar { display:flex; gap:8px; align-items:center; }
  button { border:1px solid #c5ccd6; border-radius:8px; background:#fff; cursor:pointer; font-size:13px; padding:7px 12px; }
  button:hover { background:#eef2f7; }
  button.primary { background:#2563eb; border-color:#2563eb; color:#fff; font-weight:700; }
  button.primary:disabled { background:#94a3b8; border-color:#94a3b8; cursor:not-allowed; }
  .progress { height:10px; border-radius:6px; background:#e5e7eb; overflow:hidden; flex:1; }
  .progress > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#06b6d4,#2563eb); transition:width .15s; }
  .prog-text { font-size:11px; color:#475569; min-height:14px; }
  label.f { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:12px; color:#374151; }
  label.f input, label.f select { width:150px; padding:4px 6px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; }
  details { border:1px solid #eef2f7; border-radius:8px; }
  details > summary { cursor:pointer; padding:6px 10px; font-size:12px; font-weight:600; color:#334155; }
  details .body { padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  .runs { display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto; }
  .run { display:flex; justify-content:space-between; gap:6px; padding:6px 8px; border:1px solid #eef2f7; border-radius:6px; cursor:pointer; font-size:12px; }
  .run:hover { background:#eff6ff; border-color:#bfdbfe; }
  .run .nm { font-weight:600; }
  .run .mt { color:#64748b; }
  .pos { color:#2563eb; } .neg { color:#d97706; }
  .err { color:#b45309; font-size:12px; }
  .content { display:grid; grid-template-rows:auto auto auto 1fr; min-height:0; }
  .cards { display:flex; gap:8px; flex-wrap:wrap; padding:10px 14px; background:#fff; border-bottom:1px solid #e2e8f0; }
  .card { min-width:104px; padding:6px 10px; border:1px solid #e5e7eb; border-radius:8px; background:#fbfcfe; }
  .card .k { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:.4px; }
  .card .v { font-size:16px; font-weight:700; margin-top:2px; }
  .run-meta { display:none; background:#fff; border-bottom:1px solid #e2e8f0; }
  .run-meta.visible { display:block; }
  .run-meta-bar { display:flex; align-items:center; gap:8px; min-height:34px; padding:5px 14px; border-bottom:1px solid #eef2f7; }
  .run-meta.collapsed .run-meta-bar { border-bottom:0; }
  .run-meta-title { font-size:12px; font-weight:800; color:#334155; text-transform:uppercase; letter-spacing:.4px; }
  .run-meta-sub { min-width:0; color:#64748b; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta-toggle { height:24px; min-width:62px; padding:0 8px; border-radius:6px; font-size:12px; }
  .run-meta-body { display:flex; padding:8px 14px; gap:8px; flex-wrap:wrap; align-items:stretch; }
  .run-meta.collapsed .run-meta-body { display:none; }
  .run-meta .meta-head { min-width:180px; padding:6px 8px; border:1px solid #e5e7eb; border-radius:8px; background:#fbfcfe; }
  .run-meta .meta-head b { display:block; font-size:13px; }
  .run-meta .meta-head span { display:block; margin-top:2px; font-size:11px; color:#64748b; }
  .run-meta .meta-group { min-width:220px; max-width:420px; flex:1 1 260px; padding:6px 8px; border:1px solid #eef2f7; border-radius:8px; background:#fbfcfe; }
  .run-meta .meta-title { font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:.4px; font-weight:800; margin-bottom:5px; }
  .run-meta .meta-items { display:flex; flex-wrap:wrap; gap:5px; }
  .run-meta .meta-param { display:inline-flex; gap:4px; max-width:100%; padding:2px 5px; border:1px solid #e5e7eb; border-radius:6px; background:#fff; font-size:11px; }
  .run-meta .meta-param b { color:#475569; font-weight:600; overflow:hidden; text-overflow:ellipsis; }
  .run-meta .meta-param span { font-family:Consolas,"SFMono-Regular",monospace; overflow:hidden; text-overflow:ellipsis; }
  .toolbar { display:flex; align-items:center; gap:8px; padding:6px 14px; background:#fff; border-bottom:1px solid #e2e8f0; }
  .toolbar .rng { margin-left:auto; font-size:12px; color:#475569; }
  .toolbar button.tool-toggle { height:28px; padding:0 10px; border-radius:8px; }
  .toolbar button.tool-toggle.active { background:#0f172a; border-color:#0f172a; color:#fff; }
  .seg { display:inline-flex; border:1px solid #cbd5e1; border-radius:8px; overflow:hidden; background:#fff; }
  .seg button { border:0; border-radius:0; height:28px; padding:0 10px; }
  .seg button + button { border-left:1px solid #cbd5e1; }
  .seg button.active { background:#0f172a; color:#fff; }
  .charts { --equity-height:180px; display:grid; grid-template-rows:minmax(160px,1fr) 7px minmax(80px,var(--equity-height)); min-height:0; }
  .charts.equity-collapsed { grid-template-rows:minmax(160px,1fr) 0 0; }
  .charts.equity-collapsed .splitter, .charts.equity-collapsed #equity { display:none; }
  .splitter { height:7px; cursor:row-resize; background:#eef2f7; border-top:1px solid #cbd5e1; border-bottom:1px solid #cbd5e1; }
  .splitter:hover, .splitter.dragging { background:#dbeafe; }
  canvas { display:block; width:100%; height:100%; background:#fbfcfe; cursor:grab; }
  canvas.dragging { cursor:grabbing; }
  .empty { display:flex; align-items:center; justify-content:center; height:100%; color:#94a3b8; font-size:14px; }
</style>
</head>
<body class="viewer">
<header>
  <a class="title brand-home" href="/" title="Back to home">ACCELERANDO</a>
  <span class="tag">studio · the world has been accelerated</span>
  <span class="status" id="status"></span>
</header>
<div class="main">
  <aside class="side">
    <div class="panel">
      <h3>run</h3>
      <div class="body">
        <div class="runbar">
          <button class="primary" id="runBtn" style="flex:0 0 auto;">▶ Run</button>
          <div class="progress"><i id="progBar"></i></div>
        </div>
        <div class="prog-text" id="progText"></div>
        <div class="err" id="runErr"></div>
        <div class="runbar">
          <input id="saveName" placeholder="Save name..." style="flex:1; padding:6px 8px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px;">
          <button id="saveBtn">Save</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3>saved runs</h3>
      <div class="body"><div class="runs" id="runs"></div></div>
    </div>

    <div class="panel">
      <h3>config</h3>
      <div class="body" id="form"></div>
    </div>
  </aside>

  <section class="content">
    <div class="cards" id="cards"></div>
    <div class="run-meta" id="runMeta"></div>
    <div class="toolbar">
      <span class="seg" aria-label="trade navigation">
        <button id="tradeFirst" title="Jump to first trade">First</button>
        <button id="tradePrev" title="Jump to previous trade">Previous</button>
        <button id="tradeNext" title="Jump to next trade">Next</button>
        <button id="tradeLast" title="Jump to last trade">Last</button>
      </span>
      <span class="seg" aria-label="chart mode">
        <button id="modeCandles" class="active" title="Candlestick chart">Candles</button>
        <button id="modeFootprint" title="Footprint chart">Footprint</button>
        <button id="modeHeatmap" title="L2 heatmap chart">Heatmap</button>
      </span>
      <span id="overlayToggles" style="display:inline-flex;gap:10px;align-items:center;flex-wrap:wrap;"></span>
      <label style="font-size:12px;color:#374151;display:inline-flex;gap:6px;align-items:center;">heat <select id="heatMetric" style="height:26px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;"><option value="total">total</option><option value="bid">bid</option><option value="ask">ask</option></select></label>
      <button id="toggleEquity" class="tool-toggle active" type="button" title="Hide equity" aria-pressed="true">Equity</button>
      <span class="rng" id="range"></span>
    </div>
    <div class="charts">
      <canvas id="price"></canvas>
      <div id="chartSplitter" class="splitter" title="Drag to resize charts"></div>
      <canvas id="equity"></canvas>
    </div>
  </section>
</div>
<script>
const COLORS = { up:"#6d6dff", down:"#ff6d6d", buy:"#6d6dff", sell:"#ff6d6d", tradeText:"#ffffff", grid:"#e2e8f0", axis:"#475569" };
let SCHEMA=null, CONFIG=null, DATA=null, fps=[], eq=[], trades=[];
let barsPerView=300, start=0, hover=null, drag=null, splitDrag=null, chartMode="candles", heatMetric="total", poll=null;
// Overlay visibility, keyed by category ("bands", "trades", or a marker group). Persisted across
// re-renders so a hidden overlay stays hidden when the result is reloaded.
let overlayState={};
const overlayLabel=cat=>cat==="bands"?"bands":cat==="trades"?"trades":cat.replace(/_/g," ");
const overlayOn=cat=>overlayState[cat]!==false;
const markerCat=p=>p.group||"markers";
const volumeProfileCat=p=>(p.id||"").startsWith("entry_vp_")?"entry_vp":"volume_profiles";
const priceBoxCat=p=>p.group||"price_boxes";
let yZoom={price:{manual:false,lo:null,hi:null},equity:{manual:false,lo:null,hi:null}};
const $ = id => document.getElementById(id);
const price=$("price"), pctx=price.getContext("2d");
const equity=$("equity"), ectx=equity.getContext("2d");
const charts=document.querySelector(".charts"), splitter=$("chartSplitter");
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function readStoredBool(key,fallback=false){ try{ const v=localStorage.getItem(key); return v===null?fallback:v==="1"; } catch(_){ return fallback; } }
function writeStoredBool(key,value){ try{ localStorage.setItem(key,value?"1":"0"); } catch(_){} }
let metaCollapsed=readStoredBool("accelerando.runMetaCollapsed",false);
let equityCollapsed=readStoredBool("accelerando.equityCollapsed",false);
const fmt=(n,d=2)=>(n===null||n===undefined||!isFinite(n))?"–":Number(n).toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d});
const fmtTs=ns=>new Date(Number(ns)/1e6).toLocaleString();
const fmtAxisTs=ns=>new Date(Number(ns)/1e6).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
const sc=n=>n>=0?"pos":"neg";
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function fmtParam(v){
  if(v===null||v===undefined)return "–";
  if(typeof v==="number")return Number.isInteger(v)?String(v):fmt(v,4);
  if(typeof v==="boolean")return v?"true":"false";
  return esc(v);
}
function flattenParams(value,prefix="",out=[]){
  if(value===null||value===undefined)return out;
  if(Array.isArray(value)){ value.forEach((item,i)=>flattenParams(item,prefix||String(i+1),out)); return out; }
  if(typeof value==="object"){
    if(value.adapter&&value.params&&typeof value.params==="object"){
      flattenParams(value.params,prefix?`${prefix}.${value.adapter}`:value.adapter,out);
      return out;
    }
    for(const [k,v] of Object.entries(value)){ if(k!=="adapter")flattenParams(v,prefix?`${prefix}.${k}`:k,out); }
    return out;
  }
  out.push({key:prefix,value});
  return out;
}
function groupedParams(params){
  const groups=[];
  for(const item of flattenParams(params||{})){
    const parts=item.key.split(".");
    const name=parts.pop()||item.key;
    const group=parts.join(".")||"params";
    let g=groups.find(x=>x.name===group);
    if(!g){ g={name:group,items:[]}; groups.push(g); }
    g.items.push({name,value:item.value});
  }
  return groups;
}
function renderRunMeta(){
  const host=$("runMeta"); if(!host)return;
  const summary=typeof RUN_SUMMARY==="object"?RUN_SUMMARY:null;
  if(!summary){ host.classList.remove("visible"); host.innerHTML=""; return; }
  const groups=groupedParams(summary.params);
  host.classList.add("visible");
  const label=summary.label||summary.id||"run", strategy=summary.strategy||"";
  host.innerHTML=`<div class="run-meta-bar"><button id="toggleRunMeta" class="meta-toggle" type="button" aria-expanded="${String(!metaCollapsed)}"></button><div class="run-meta-title">Parameters</div><div class="run-meta-sub">${esc(label)}${strategy?` · ${esc(strategy)}`:""}</div></div>`+
    `<div class="run-meta-body"><div class="meta-head"><b>${esc(label)}</b><span>${esc(strategy)}</span></div>`+
    groups.map(g=>`<div class="meta-group"><div class="meta-title">${esc(g.name)}</div><div class="meta-items">${g.items.map(p=>`<span class="meta-param" title="${esc(p.name)} = ${esc(fmtParam(p.value))}"><b>${esc(p.name)}</b><span>${fmtParam(p.value)}</span></span>`).join("")}</div></div>`).join("")+
    `</div>`;
  $("toggleRunMeta").onclick=()=>setMetaCollapsed(!metaCollapsed);
  setMetaCollapsed(metaCollapsed,false);
}

function setMetaCollapsed(collapsed,persist=true){
  metaCollapsed=!!collapsed;
  const host=$("runMeta");
  if(host){
    host.classList.toggle("collapsed",metaCollapsed);
    const btn=$("toggleRunMeta");
    if(btn){
      btn.textContent=metaCollapsed?"Show params":"Hide params";
      btn.title=metaCollapsed?"Show parameter panel":"Hide parameter panel";
      btn.setAttribute("aria-expanded",String(!metaCollapsed));
    }
  }
  if(persist)writeStoredBool("accelerando.runMetaCollapsed",metaCollapsed);
  requestAnimationFrame(resize);
}

function setEquityCollapsed(collapsed,persist=true){
  equityCollapsed=!!collapsed;
  charts.classList.toggle("equity-collapsed",equityCollapsed);
  const btn=$("toggleEquity");
  if(btn){
    btn.classList.toggle("active",!equityCollapsed);
    btn.title=equityCollapsed?"Show equity":"Hide equity";
    btn.setAttribute("aria-pressed",String(!equityCollapsed));
  }
  if(equityCollapsed){
    if(hover&&hover.canvas==="equity")hover=null;
    splitDrag=null;
    splitter.classList.remove("dragging");
  }
  if(persist)writeStoredBool("accelerando.equityCollapsed",equityCollapsed);
  requestAnimationFrame(resize);
}

function resetYZoom(){ yZoom={price:{manual:false,lo:null,hi:null},equity:{manual:false,lo:null,hi:null}}; }
function applyYZoom(name,lo,hi){
  if(!(isFinite(lo)&&isFinite(hi))||lo===hi){lo-=1;hi+=1;}
  const st=yZoom[name];
  if(st.manual&&isFinite(st.lo)&&isFinite(st.hi)&&st.hi>st.lo)return [st.lo,st.hi];
  st.lo=lo; st.hi=hi;
  return [lo,hi];
}
function lockYZoom(name){ const st=yZoom[name]; if(st&&isFinite(st.lo)&&isFinite(st.hi)&&st.hi>st.lo)st.manual=true; }
function autoYZoom(name){ const st=yZoom[name]; if(st)st.manual=false; }
function zoomY(name,factor,frac){
  const st=yZoom[name]; if(!st||st.lo==null||st.hi==null)return;
  const oldLo=st.lo, oldHi=st.hi, oldSpan=oldHi-oldLo; if(!(oldSpan>0))return;
  const nextSpan=clamp(oldSpan/factor,1e-12,1e18);
  const anchor=oldHi-frac*oldSpan;
  const nextLo=anchor-(1-frac)*nextSpan;
  st.manual=true; st.lo=nextLo; st.hi=nextLo+nextSpan;
  draw();
}
function drawTimeAxis(ctx,vis,L,T,pw,ph,W,R,tsKey="ts_last_ns"){
  if(!vis.length)return;
  ctx.save(); ctx.strokeStyle=COLORS.grid; ctx.fillStyle=COLORS.axis; ctx.font="10px Segoe UI, Arial"; ctx.textAlign="center"; ctx.textBaseline="top";
  const ticks=Math.min(5,vis.length);
  for(let i=0;i<ticks;i++){
    const idx=ticks===1?0:Math.round((vis.length-1)*i/(ticks-1));
    const x=L+(idx+0.5)*pw/Math.max(1,vis.length);
    const ts=vis[idx][tsKey]??vis[idx].ts_last_ns??vis[idx].ts_ns;
    ctx.beginPath();ctx.moveTo(x,T+ph);ctx.lineTo(x,T+ph+4);ctx.stroke();
    ctx.fillText(fmtAxisTs(ts),x,T+ph+7);
  }
  ctx.textAlign="right"; ctx.fillText("Time",W-R,T+ph+20); ctx.restore();
}
async function fetchJson(url){ const r=await fetch(url); if(!r.ok) throw new Error(`${url}: ${r.status}`); return await r.json(); }

// ---------- config form ----------
function rangeOf(entry){ const r=entry.range; if(r==="Fixed")return{kind:"Fixed"}; const k=Object.keys(r)[0]; return {kind:k, ...r[k]}; }
function valType(entry){ const r=rangeOf(entry); if(r.kind==="Int")return"int"; if(r.kind==="Float")return"float"; if(r.kind==="Choice")return"str"; return typeof entry.default==="number"?(Number.isInteger(entry.default)?"int":"float"):"str"; }

function paramRow(entry, value){
  const r=rangeOf(entry); const t=valType(entry);
  const v = value!==undefined? value : entry.default;
  const wrap=document.createElement("label"); wrap.className="f"; wrap.append(entry.name);
  let inp;
  if(r.kind==="Choice"){ inp=document.createElement("select"); for(const o of r.options||r.Choice||[]){ const op=document.createElement("option"); op.value=o; op.textContent=o; if(o==v)op.selected=true; inp.append(op);} }
  else if(t==="str"){ inp=document.createElement("input"); inp.type="text"; inp.value=v??""; }
  else { inp=document.createElement("input"); inp.type="number"; inp.value=v;
         if(r.kind==="Int"){ inp.step=r.step||1; if(r.min!=null)inp.min=r.min; if(r.max!=null)inp.max=r.max; }
         else if(r.kind==="Float"){ inp.step=r.step||"any"; if(r.min!=null)inp.min=r.min; if(r.max!=null)inp.max=r.max; } }
  inp.dataset.name=entry.name; inp.dataset.type=t; inp.className="param";
  wrap.append(inp); return wrap;
}

function stageBlock(label, kinds, chosenAdapter, params, opts={}){
  const block=document.createElement("div"); block.dataset.stage=label;
  const head=document.createElement("label"); head.className="f";
  head.style.fontWeight="700"; head.append(label);
  const sel=document.createElement("select"); sel.className="adapter";
  for(const k of kinds){ const o=document.createElement("option"); o.value=k.name; o.textContent=k.name; if(k.name===chosenAdapter)o.selected=true; sel.append(o); }
  head.append(sel); block.append(head);
  const pdiv=document.createElement("div"); block.append(pdiv);
  function renderParams(){
    pdiv.innerHTML="";
    const k=kinds.find(x=>x.name===sel.value); if(!k||!k.params)return;
    const det=document.createElement("details"); if(opts.open)det.open=true;
    const sum=document.createElement("summary"); sum.textContent="Parameters ("+k.params.entries.length+")"; det.append(sum);
    const body=document.createElement("div"); body.className="body";
    for(const e of k.params.entries) body.append(paramRow(e, params? params[e.name] : undefined));
    det.append(body); pdiv.append(det);
  }
  sel.onchange=()=>{ params=null; renderParams(); };
  renderParams();
  return block;
}

function buildForm(){
  const f=$("form"); f.innerHTML="";
  f.append(stageBlock("data", SCHEMA.sources, CONFIG.data.adapter, CONFIG.data.params, {open:true}));
  f.append(stageBlock("aggregator", SCHEMA.aggregators, CONFIG.aggregator.adapter, CONFIG.aggregator.params, {open:true}));
  const ind = CONFIG.indicator[0] || {adapter:SCHEMA.indicators[0].name, params:{}};
  f.append(stageBlock("indicator", SCHEMA.indicators, ind.adapter, ind.params));
  f.append(stageBlock("strategy", SCHEMA.strategies, CONFIG.strategy.adapter, CONFIG.strategy.params, {open:true}));
  // broker
  const b=document.createElement("div"); b.dataset.stage="broker";
  const head=document.createElement("label"); head.className="f"; head.style.fontWeight="700"; head.append("broker"); b.append(head);
  const det=document.createElement("details"); det.open=true; const sum=document.createElement("summary"); sum.textContent="Parameters"; det.append(sum);
  const body=document.createElement("div"); body.className="body";
  const bk=CONFIG.broker||{};
  for(const [name,val] of [["commission_per_contract",bk.commission_per_contract??0],["slippage_ticks",bk.slippage_ticks??0],["starting_equity",bk.starting_equity??100000]]){
    const w=document.createElement("label"); w.className="f"; w.append(name);
    const inp=document.createElement("input"); inp.type="number"; inp.step="any"; inp.value=val; inp.dataset.name=name; inp.dataset.type="float"; inp.className="bparam";
    w.append(inp); body.append(w);
  }
  det.append(body); b.append(det); f.append(b);
}

function readParams(container){
  const out={};
  for(const inp of container.querySelectorAll(".param")){
    const t=inp.dataset.type;
    out[inp.dataset.name] = t==="str"? inp.value : (t==="int"? parseInt(inp.value,10) : parseFloat(inp.value));
  }
  return out;
}
function stageEl(label){ return [...document.querySelectorAll("[data-stage]")].find(e=>e.dataset.stage===label); }
function collectConfig(){
  const get=label=>{ const el=stageEl(label); return {adapter: el.querySelector(".adapter").value, params: readParams(el)}; };
  const bro={}; for(const inp of stageEl("broker").querySelectorAll(".bparam")) bro[inp.dataset.name]=parseFloat(inp.value);
  return {
    keep_footprints:true,
    data:get("data"), aggregator:get("aggregator"),
    indicator:[get("indicator")], strategy:get("strategy"),
    broker:bro,
  };
}

// ---------- run + progress ----------
async function runBacktest(){
  $("runErr").textContent=""; const cfg=collectConfig();
  const r=await (await fetch("/api/backtest",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)})).json();
  if(!r.ok){ $("runErr").textContent=r.error||"failed"; return; }
  $("runBtn").disabled=true;
  if(poll) clearInterval(poll);
  poll=setInterval(checkProgress, 250); checkProgress();
}
async function checkProgress(){
  let p; try{ p=await (await fetch("/api/progress")).json(); }catch(e){ return; }
  const bar=$("progBar"), txt=$("progText");
  if(p.pct!=null){ bar.style.width=(p.pct*100).toFixed(1)+"%"; }
  else if(p.running){ bar.style.width="100%"; bar.style.opacity=0.4; }
  const mb=x=>(x/1048576).toFixed(0);
  txt.textContent = p.running
    ? `running… ${p.pct!=null?(p.pct*100).toFixed(1)+"% · ":""}${mb(p.bytes)}/${p.total?mb(p.total):"?"} MB · ${p.footprints} footprints`
    : (p.error? "" : (p.has_result? "done." : "idle"));
  if(p.error){ $("runErr").textContent=p.error; }
  if(!p.running){
    clearInterval(poll); poll=null; $("runBtn").disabled=false; bar.style.opacity=1;
    if(p.has_result && !p.error){ bar.style.width="100%"; await loadResult(); refreshRuns(); }
  }
}
async function loadResult(){
  const r=await fetch("/api/result");
  if(!r.ok) throw new Error(`/api/result: ${r.status}`);
  const data=await r.json();
  if(data&&data.error) throw new Error(data.error);
  renderResult(data);
}

// ---------- saved runs ----------
async function refreshRuns(){
  const runs=await (await fetch("/api/runs")).json();
  const el=$("runs"); el.innerHTML="";
  if(!runs.length){ el.innerHTML='<div style="color:#94a3b8;font-size:12px;">No saved runs yet</div>'; return; }
  for(const r of runs){
    const d=document.createElement("div"); d.className="run";
    d.innerHTML=`<span class="nm">${r.name}</span><span class="mt"><span class="${r.net_pnl>=0?'pos':'neg'}">$${fmt(r.net_pnl,0)}</span> · ${r.trades}t · S${fmt(r.sharpe,2)}</span>`;
    d.onclick=()=>loadRun(r.name);
    el.append(d);
  }
}
async function loadRun(name){
  const r=await (await fetch("/api/load?name="+encodeURIComponent(name))).json();
  if(!r.ok){ $("runErr").textContent=r.error||"load failed"; return; }
  CONFIG=await (await fetch("/api/config")).json(); buildForm();
  await loadResult(); $("status").textContent="loaded run: "+name;
}

// ---------- chart rendering ----------
function renderResult(data){
  DATA=data; fps=data.footprints||[]; eq=data.equity||[]; trades=data.trades||[];
  for(const t of trades){ t._ei=idxForEntryTs(t.entry_ts_ns); t._xi=idxForTs(t.exit_ts_ns); }
  renderCards(data.metrics);
  renderRunMeta();
  buildOverlayToggles();
  barsPerView=Math.min(300,Math.max(20,fps.length)); start=Math.max(0,fps.length-barsPerView);
  resetYZoom();
  resize();
}
// Collect the overlay categories actually present in the loaded result, in a stable order:
// background bands, then marker groups (from indicators/strategies), then trade positions.
function overlayCategories(){
  let hasBands=false; const markerGroups=new Set();
  for(const b of fps){ for(const p of (b.plots||[])){
    if(p.kind==="BackgroundBand")hasBands=true;
    else if(p.kind==="Marker")markerGroups.add(markerCat(p));
    else if(p.kind==="VolumeProfile")markerGroups.add(volumeProfileCat(p));
    else if(p.kind==="PriceBox")markerGroups.add(priceBoxCat(p));
  } }
  const cats=[];
  if(hasBands)cats.push("bands");
  for(const g of [...markerGroups].sort())cats.push(g);
  if(trades.length)cats.push("trades");
  return cats;
}
function defaultOverlayState(cat){
  const strategy=typeof RUN_STRATEGY==="string"?RUN_STRATEGY:"";
  if(strategy==="delta_regime") return cat!=="big_trades";
  if(strategy==="big_trade_regime") return cat!=="imbalance";
  return true;
}
function buildOverlayToggles(){
  const host=$("overlayToggles"); if(!host)return;
  host.innerHTML="";
  for(const cat of overlayCategories()){
    if(!(cat in overlayState))overlayState[cat]=defaultOverlayState(cat);
    const lab=document.createElement("label");
    lab.style.cssText="font-size:12px;color:#374151;display:inline-flex;gap:6px;align-items:center;";
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=overlayState[cat]!==false;
    cb.onchange=()=>{ overlayState[cat]=cb.checked; draw(); };
    lab.append(cb, document.createTextNode(overlayLabel(cat)));
    host.append(lab);
  }
}
function idxForTs(ns){ const x=Number(ns); let lo=0,hi=fps.length-1,best=0; while(lo<=hi){const m=(lo+hi)>>1; if(Number(fps[m].ts_last_ns)<=x){best=m;lo=m+1;}else hi=m-1;} return best; }
function idxForEntryTs(ns){
  const x=Number(ns); let lo=0,hi=fps.length-1,best=0;
  while(lo<=hi){ const m=(lo+hi)>>1; if(Number(fps[m].ts_first_ns)<=x){best=m;lo=m+1;} else hi=m-1; }
  if(fps[best] && x<=Number(fps[best].ts_last_ns)) return best;
  return idxForTs(ns);
}
function renderCards(m){
  if(!m){ $("cards").innerHTML=""; return; }
  const cards=[["Net PnL","$"+fmt(m.net_pnl),sc(m.net_pnl)],["Return",fmt(m.return_pct)+"%",sc(m.return_pct)],
    ["Trades",String(m.trades),""],["Win rate",fmt(m.win_rate*100,1)+"%",""],
    ["Profit factor",fmt(m.profit_factor),sc(m.profit_factor-1)],["Sharpe",fmt(m.sharpe),sc(m.sharpe)],
    ["Sortino",fmt(m.sortino),sc(m.sortino)],["Max DD","$"+fmt(m.max_drawdown),"neg"],["Max DD %",fmt(m.max_drawdown_pct,1)+"%","neg"]];
  $("cards").innerHTML=cards.map(([k,v,c])=>`<div class="card"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join("");
}
function setBarsPerView(next,anchor=1){ autoYZoom("equity"); const old=barsPerView; next=Math.round(clamp(next,1,Math.max(1,fps.length))); const a=start+old*anchor; barsPerView=next; start=clamp(Math.round(a-barsPerView*anchor),0,Math.max(0,fps.length-barsPerView)); draw(); }
function resize(){ for(const c of [price,equity]){ const r=c.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; c.width=Math.max(1,Math.floor(r.width*dpr)); c.height=Math.max(1,Math.floor(r.height*dpr)); c.getContext("2d").setTransform(dpr,0,0,dpr,0,0);} draw(); }
function viewRange(){ const end=Math.min(fps.length,start+barsPerView); return [start,end]; }
function sortedTrades(){ return trades.filter(t=>Number.isFinite(t._ei)).sort((a,b)=>a._ei-b._ei); }
function currentTradeIdx(list){
  if(!list.length)return -1;
  const center=start+barsPerView/2;
  let best=0, bestDist=Infinity;
  for(let i=0;i<list.length;i++){
    const dist=Math.abs(list[i]._ei-center);
    if(dist<bestDist){ best=i; bestDist=dist; }
  }
  return best;
}
function jumpToTrade(which){
  const list=sortedTrades(); if(!list.length)return;
  const cur=currentTradeIdx(list);
  let idx=0;
  if(which==="first")idx=0;
  else if(which==="last")idx=list.length-1;
  else if(which==="next")idx=(cur+1+list.length)%list.length;
  else if(which==="prev")idx=(cur-1+list.length)%list.length;
  const t=list[idx];
  overlayState.trades=true;
  start=clamp(Math.round(t._ei-barsPerView/2),0,Math.max(0,fps.length-barsPerView));
  autoYZoom("price"); autoYZoom("equity");
  $("status").textContent=`trade ${idx+1}/${list.length}  ${fmtTs(t.entry_ts_ns)}  ${t.dir>0?"long":"short"} ${fmt(t.qty,2)} @ ${fmt(t.entry_px,2)}  pnl $${fmt(t.pnl,2)}`;
  buildOverlayToggles();
  draw();
}
function setChartMode(mode){ chartMode=mode; $("modeCandles").classList.toggle("active",mode==="candles"); $("modeFootprint").classList.toggle("active",mode==="footprint"); $("modeHeatmap").classList.toggle("active",mode==="heatmap"); draw(); }
function tickSizeFor(vis){
  if(DATA&&DATA.tick_size>0)return DATA.tick_size;
  let best=Infinity;
  for(const b of vis){ const lv=(b.ladder||[]).map(x=>x.price).sort((a,b)=>a-b); for(let i=1;i<lv.length;i++){ const d=lv[i]-lv[i-1]; if(d>0)best=Math.min(best,d); } }
  return isFinite(best)?best:0.25;
}
function clipPlot(ctx,L,T,pw,ph){
  ctx.beginPath(); ctx.rect(L,T,pw,ph); ctx.clip();
}
function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function roundedRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function drawLabel(ctx,text,x,y,color,layout,opts={}){
  if(!text||!layout)return;
  const padX=4,padY=2,lineH=12;
  ctx.save(); ctx.font=opts.font||"10px Segoe UI, Arial"; ctx.textBaseline="middle";
  const w=ctx.measureText(text).width+padX*2, h=lineH+padY*2;
  const align=opts.align||"left";
  const baseX=align==="center"?x-w/2:align==="right"?x-w:x;
  const shifts=[0,-14,14,-28,28,-42,42,-56,56,-70,70,-84,84];
  let chosen=null;
  for(const dy of shifts){
    const rx=clamp(baseX,layout.L+2,layout.L+layout.pw-w-2);
    const ry=clamp(y+dy-h/2,layout.T+2,layout.T+layout.ph-h-2);
    const rect={x:rx,y:ry,w,h};
    if(!layout.boxes.some(b=>rectsOverlap(rect,b))){ chosen=rect; break; }
    if(!chosen)chosen=rect;
  }
  layout.boxes.push(chosen);
  ctx.fillStyle=opts.bg||"rgba(255,255,255,0.90)";
  roundedRect(ctx,chosen.x,chosen.y,chosen.w,chosen.h,4); ctx.fill();
  ctx.strokeStyle=opts.border||"rgba(15,23,42,0.18)"; ctx.stroke();
  ctx.fillStyle=color||"#111827"; ctx.textAlign="left";
  ctx.fillText(text,chosen.x+padX,chosen.y+chosen.h/2);
  ctx.restore();
}
function drawCandles(ctx,vis,L,T,ph,xStep,cw,y){
  for(let i=0;i<vis.length;i++){ const b=vis[i]; const x=L+i*xStep+xStep/2; const c=b.close>=b.open?COLORS.up:COLORS.down; ctx.strokeStyle=c;ctx.fillStyle=c; ctx.beginPath();ctx.moveTo(x,y(b.high));ctx.lineTo(x,y(b.low));ctx.stroke(); const oy=y(b.open),cy=y(b.close); ctx.fillRect(x-cw/2,Math.min(oy,cy),cw,Math.max(1,Math.abs(oy-cy))); }
}
function markerSize(p){
  const text=String(p.text??"");
  const m=text.replace(/,/g,"").match(/-?\d+(\.\d+)?/);
  const n=m?Number(m[0]):0;
  return Number.isFinite(n)&&n>0?n:0;
}
function colorAlpha(color,a){
  const c=String(color||"").trim();
  const m=c.match(/^#([0-9a-f]{6})$/i);
  if(!m)return c;
  const n=parseInt(m[1],16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  return `rgba(${r},${g},${b},${a})`;
}
function tradeMarkerColor(color){
  const c=String(color||"").trim().toLowerCase();
  if(!c||c==="#2563eb")return COLORS.buy;
  if(["#d97706","#f59e0b","#f97316","#e8832a"].includes(c))return COLORS.sell;
  return color;
}
function drawBigTradeBubble(ctx,p,x,yy,r){
  const color=tradeMarkerColor(p.color), text=String(p.text??"");
  ctx.save();
  ctx.shadowColor="rgba(15,23,42,0.18)";
  ctx.shadowBlur=5;
  ctx.shadowOffsetY=1;
  ctx.fillStyle=colorAlpha(color,0.74);
  ctx.beginPath(); ctx.arc(x,yy,r,0,Math.PI*2); ctx.fill();
  ctx.shadowColor="transparent";
  ctx.strokeStyle=colorAlpha(color,0.88);
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,yy,Math.max(2,r-0.75),0,Math.PI*2); ctx.stroke();
  if(text&&r>=9){
    const fontSize=clamp(Math.floor(r*0.72),8,13);
    ctx.font=`800 ${fontSize}px Segoe UI, Arial`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle=COLORS.tradeText;
    const maxW=Math.max(6,r*1.72);
    let label=text;
    while(label.length>1&&ctx.measureText(label).width>maxW)label=label.slice(0,-1);
    ctx.fillText(label,x,yy+0.5);
  }
  ctx.restore();
}
function drawPlotMarkers(ctx,vis,L,T,ph,xStep,y,labelLayout){
  ctx.save(); ctx.font="10px Segoe UI, Arial"; ctx.textBaseline="middle";
  let maxBigTradeSize=0;
  for(const b of vis){
    for(const p of (b.plots||[])){
      if(p.kind==="Marker"&&markerCat(p)==="big_trades")maxBigTradeSize=Math.max(maxBigTradeSize,markerSize(p));
    }
  }
  for(let i=0;i<vis.length;i++){
    const b=vis[i], x=L+i*xStep+xStep/2;
    for(const p of (b.plots||[])){
      if(p.kind!=="Marker"||p.price==null)continue;
      if(!overlayOn(markerCat(p)))continue;
      const yy=y(p.price); if(yy<T-30||yy>T+ph+30)continue;
      const color=p.color||"#111827", cat=markerCat(p);
      if(cat==="big_trades"){
        const size=markerSize(p);
        const n=maxBigTradeSize>0?Math.sqrt(size/maxBigTradeSize):0.5;
        const r=clamp(8+n*20,10,28);
        drawBigTradeBubble(ctx,p,x,yy,r);
        continue;
      }
      ctx.fillStyle=color; ctx.strokeStyle="#ffffff"; ctx.lineWidth=2;
      ctx.beginPath();
      if(p.shape==="triangle_up"){
        ctx.moveTo(x,yy-8);ctx.lineTo(x-6,yy+5);ctx.lineTo(x+6,yy+5);ctx.closePath();
      }else if(p.shape==="triangle_down"){
        ctx.moveTo(x,yy+8);ctx.lineTo(x-6,yy-5);ctx.lineTo(x+6,yy-5);ctx.closePath();
      }else{
        ctx.arc(x,yy,5,0,Math.PI*2);
      }
      ctx.fill(); ctx.stroke();
      if(p.text&&xStep>=10){ const textDx=p.text_dx??8, textDy=p.text_dy??0; drawLabel(ctx,p.text,x+textDx,yy+textDy,color,labelLayout); }
    }
  }
  ctx.restore();
}
function drawVolumeProfiles(ctx,vis,L,T,pw,ph,xStep,y,tick,labelLayout){
  if(!overlayOn("entry_vp")&&!overlayOn("volume_profiles"))return;
  ctx.save(); ctx.font="10px Segoe UI, Arial"; ctx.textBaseline="middle";
  for(let i=0;i<vis.length;i++){
    const b=vis[i], x=L+i*xStep+xStep/2;
    for(const p of (b.plots||[])){
      if(p.kind!=="VolumeProfile"||!(p.levels||[]).length)continue;
      if(!overlayOn(volumeProfileCat(p)))continue;
      let maxProfile=0,maxDelta=0;
      for(const lv of p.levels){
        const buy=lv.buy_vol||0,sell=lv.sell_vol||0;
        maxProfile=Math.max(maxProfile,buy+sell);
        maxDelta=Math.max(maxDelta,Math.abs(buy-sell));
      }
      if(!(maxProfile>0))continue;
      const span=Math.max(1,Math.round(p.span||1));
      const x0=clamp(L+(i-span+1)*xStep,L,L+pw);
      const x1=clamp(L+(i+1)*xStep,L,L+pw);
      const width=Math.max(18,x1-x0), half=width/2, mid=x0+width/2;
      let minY=Infinity,maxY=-Infinity;
      for(const lv of p.levels){
        const top=y(lv.price+tick/2), bot=y(lv.price-tick/2);
        const yy=Math.min(top,bot), hh=Math.max(1,Math.abs(bot-top));
        if(yy>T+ph||yy+hh<T)continue;
        minY=Math.min(minY,yy); maxY=Math.max(maxY,yy+hh);
        const buy=lv.buy_vol||0,sell=lv.sell_vol||0,total=buy+sell,delta=buy-sell;
        const deltaN=maxDelta>0?Math.min(1,Math.abs(delta)/maxDelta):0;
        const profileN=Math.min(1,total/maxProfile);
        const deltaW=half*deltaN, profileW=half*profileN;
        ctx.fillStyle=delta>=0?COLORS.buy:COLORS.sell;
        ctx.fillRect(mid-deltaW,yy,Math.max(1,deltaW),hh);
        ctx.fillStyle="#64748b";
        ctx.fillRect(mid,yy,Math.max(1,profileW),hh);
      }
      if(isFinite(minY)&&isFinite(maxY)){
        ctx.strokeStyle="rgba(17,24,39,0.55)"; ctx.setLineDash([3,2]);
        ctx.strokeRect(mid-half,minY,width,Math.max(1,maxY-minY)); ctx.setLineDash([]);
        if(xStep>=10){ drawLabel(ctx,"entry VP",mid,Math.max(T+10,minY-8),"#111827",labelLayout,{align:"center"}); }
      }
    }
  }
  ctx.restore();
}
function drawPriceBoxes(ctx,vis,L,T,pw,ph,xStep,y,labelLayout){
  ctx.save(); ctx.font="10px Segoe UI, Arial"; ctx.textBaseline="middle";
  const lastById=new Map();
  for(let i=0;i<vis.length;i++){
    for(const p of (vis[i].plots||[])){
      if(p.kind==="PriceBox")lastById.set(p.id||`__box_${i}`,i);
    }
  }
  for(let i=0;i<vis.length;i++){
    const b=vis[i];
    for(const p of (b.plots||[])){
      if(p.kind!=="PriceBox"||p.low==null||p.high==null)continue;
      if(lastById.get(p.id||`__box_${i}`)!==i)continue;
      if(!overlayOn(priceBoxCat(p)))continue;
      const span=Math.max(1,Math.round(p.span||1));
      const x0=clamp(L+(i-span+1)*xStep,L,L+pw);
      const x1=clamp(L+(i+1)*xStep,L,L+pw);
      const top=y(Math.max(p.low,p.high)), bot=y(Math.min(p.low,p.high));
      const yy=Math.min(top,bot), hh=Math.max(1,Math.abs(bot-top));
      if(yy>T+ph||yy+hh<T||x1<=L||x0>=L+pw)continue;
      const color=p.color||"#111827", w=Math.max(2,x1-x0);
      ctx.fillStyle=colorAlpha(color,0.07);
      ctx.fillRect(x0,yy,w,hh);
      ctx.strokeStyle=colorAlpha(color,0.85);
      ctx.lineWidth=1.5;
      ctx.setLineDash([5,4]);
      ctx.strokeRect(x0,yy,w,hh);
      ctx.setLineDash([]);
      if(p.text&&xStep>=10){
        drawLabel(ctx,p.text,x0+4,Math.max(T+10,yy-8),color,labelLayout);
      }
    }
  }
  ctx.restore();
}
function drawTradePositions(ctx,visibleTrades,s,e,L,T,ph,xStep,y,labelLayout){
  ctx.save(); ctx.font="10px Segoe UI, Arial"; ctx.textBaseline="middle";
  for(const t of visibleTrades){
    if(t._xi<s||t._ei>e)continue;
    const xi=clamp(t._ei-s,0,e-s-1),xo=clamp(t._xi-s,0,e-s-1);
    const ex=L+xi*xStep+xStep/2, xx=L+xo*xStep+xStep/2, x0=Math.min(ex,xx), w=Math.max(5,Math.abs(xx-ex));
    const entry=y(t.entry_px), exit=y(t.exit_px);
    const stop=(t.stop==null||!isFinite(t.stop))?null:y(t.stop), target=(t.target==null||!isFinite(t.target))?null:y(t.target);
    if(target!=null){ const top=Math.min(entry,target), h=Math.max(1,Math.abs(target-entry)); ctx.fillStyle=colorAlpha(COLORS.buy,0.16); ctx.fillRect(x0,top,w,h); ctx.strokeStyle=colorAlpha(COLORS.buy,0.65); ctx.strokeRect(x0,top,w,h); }
    if(stop!=null){ const top=Math.min(entry,stop), h=Math.max(1,Math.abs(stop-entry)); ctx.fillStyle=colorAlpha(COLORS.sell,0.16); ctx.fillRect(x0,top,w,h); ctx.strokeStyle=colorAlpha(COLORS.sell,0.65); ctx.strokeRect(x0,top,w,h); }
    ctx.strokeStyle="rgba(17,24,39,0.70)"; ctx.setLineDash([4,3]); ctx.beginPath();ctx.moveTo(x0,entry);ctx.lineTo(x0+w,entry);ctx.stroke(); ctx.setLineDash([]);
    if(target!=null){ drawLabel(ctx,"TP",x0+4,target,COLORS.up,labelLayout); }
    if(stop!=null){ drawLabel(ctx,"SL",x0+4,stop,COLORS.down,labelLayout); }
    ctx.strokeStyle=t.pnl>=0?colorAlpha(COLORS.buy,0.8):colorAlpha(COLORS.sell,0.8); ctx.beginPath();ctx.moveTo(ex,entry);ctx.lineTo(xx,exit);ctx.stroke();
    ctx.fillStyle=t.dir>0?COLORS.up:COLORS.down; ctx.beginPath(); if(t.dir>0){ctx.moveTo(ex,entry-7);ctx.lineTo(ex-5,entry+2);ctx.lineTo(ex+5,entry+2);}else{ctx.moveTo(ex,entry+7);ctx.lineTo(ex-5,entry-2);ctx.lineTo(ex+5,entry-2);} ctx.closePath();ctx.fill();
    ctx.strokeStyle=t.pnl>=0?COLORS.up:COLORS.down; ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(xx-4,exit-4);ctx.lineTo(xx+4,exit+4);ctx.moveTo(xx+4,exit-4);ctx.lineTo(xx-4,exit+4);ctx.stroke(); ctx.lineWidth=1;
  }
  ctx.restore();
}
function footprintTotals(b){
  let buy=0,sell=0;
  for(const lv of (b.ladder||[])){ buy+=lv.buy_vol||0; sell+=lv.sell_vol||0; }
  return {buy,sell,delta:buy-sell};
}
function nearestFootprintLevel(b,price){

function drawFootprints(ctx,vis,L,T,ph,xStep,y,tick){
  let maxVol=0, maxDelta=0, maxLevelDelta=0, maxProfile=0;
  for(const b of vis){
    const totals=footprintTotals(b); maxDelta=Math.max(maxDelta,Math.abs(totals.delta));

      maxVol=Math.max(maxVol,buy,sell);
      maxLevelDelta=Math.max(maxLevelDelta,Math.abs(buy-sell));
      maxProfile=Math.max(maxProfile,total);
    }
  }
  if(maxVol<=0){ drawCandles(ctx,vis,L,T,ph,xStep,Math.max(1,Math.min(16,xStep*0.7)),y); return; }
  const barW=Math.max(2,xStep*0.92), half=barW/2, showProfile=true, showFull=xStep>=70, showText=xStep>=36, showExtraText=xStep>=92, showSummary=xStep>=24;
  ctx.font="9px Segoe UI, Arial"; ctx.textBaseline="middle";
  for(let i=0;i<vis.length;i++){
    const b=vis[i], x=L+i*xStep+xStep/2, x0=x-half;
    const totals=footprintTotals(b);
    ctx.strokeStyle=b.close>=b.open?colorAlpha(COLORS.up,0.75):colorAlpha(COLORS.down,0.75);
    ctx.beginPath();ctx.moveTo(x,y(b.high));ctx.lineTo(x,y(b.low));ctx.stroke();
    for(const lv of (b.ladder||[])){
      const top=y(lv.price+tick/2), bot=y(lv.price-tick/2);
      const yy=Math.min(top,bot), hh=Math.max(1,Math.abs(bot-top));
      if(yy>T+ph||yy+hh<T)continue;
      const sell=lv.sell_vol||0,buy=lv.buy_vol||0;
      const sellA=0.08+0.50*(sell/maxVol), buyA=0.08+0.50*(buy/maxVol);
      const delta=buy-sell, deltaN=maxLevelDelta>0?Math.min(1,Math.abs(delta)/maxLevelDelta):0;
      const profileN=maxProfile>0?Math.min(1,(buy+sell)/maxProfile):0;
      if(showFull){
        const profileW=barW*0.22, flowW=(barW-profileW*2)/2;
        const deltaX=x0, sellX=x0+profileW, buyX=sellX+flowW, vpX=buyX+flowW;
        ctx.fillStyle=delta>=0?colorAlpha(COLORS.buy,0.10+0.55*deltaN):colorAlpha(COLORS.sell,0.10+0.55*deltaN);
        ctx.fillRect(deltaX+profileW*(1-deltaN),yy,Math.max(1,profileW*deltaN),hh);
        ctx.fillStyle=colorAlpha(COLORS.sell,sellA); ctx.fillRect(sellX,yy,flowW,hh);
        ctx.fillStyle=colorAlpha(COLORS.buy,buyA); ctx.fillRect(buyX,yy,flowW,hh);
        ctx.fillStyle=`rgba(100,116,139,${0.08+0.48*profileN})`;
        ctx.fillRect(vpX,yy,Math.max(1,profileW*profileN),hh);
        if(showExtraText&&hh>=8){
          ctx.fillStyle=COLORS.tradeText; ctx.textAlign="center";
          ctx.fillText(Math.round(sell),sellX+flowW/2,yy+hh/2);
          ctx.fillText(Math.round(buy),buyX+flowW/2,yy+hh/2);
        }
      } else if(showProfile) {
        const profileW=barW/2, deltaX=x0, vpX=x0+profileW;
        ctx.fillStyle=delta>=0?colorAlpha(COLORS.buy,0.10+0.58*deltaN):colorAlpha(COLORS.sell,0.10+0.58*deltaN);
        ctx.fillRect(deltaX+profileW*(1-deltaN),yy,Math.max(1,profileW*deltaN),hh);
        ctx.fillStyle=`rgba(100,116,139,${0.08+0.50*profileN})`;
        ctx.fillRect(vpX,yy,Math.max(1,profileW*profileN),hh);
      } else {
        ctx.fillStyle=colorAlpha(COLORS.sell,sellA); ctx.fillRect(x0,yy,half,hh);
        ctx.fillStyle=colorAlpha(COLORS.buy,buyA); ctx.fillRect(x,yy,half,hh);
      }
      if(!showProfile&&showText&&hh>=8){
        ctx.fillStyle=COLORS.tradeText;
        ctx.textAlign="right"; ctx.fillText(Math.round(sell),x-3,yy+hh/2);
        ctx.textAlign="left"; ctx.fillText(Math.round(buy),x+3,yy+hh/2);
      }
    }
    if(showSummary){
      const n=maxDelta>0?Math.min(1,Math.abs(totals.delta)/maxDelta):0;
      const c=totals.delta>=0?COLORS.up:COLORS.down;
      ctx.fillStyle=totals.delta>=0?colorAlpha(COLORS.buy,0.18+0.45*n):colorAlpha(COLORS.sell,0.18+0.45*n);
      ctx.fillRect(x0,T,barW,3);
      ctx.fillStyle=c; ctx.textAlign="center"; ctx.font=xStep>=46?"10px Segoe UI, Arial":"9px Segoe UI, Arial";
      const label=xStep>=46?`D ${fmt(totals.delta,0)}`:fmt(totals.delta,0);
      ctx.fillText(label,x,Math.max(T+9,y(b.high)-10));
      if(xStep>=58){
        ctx.fillStyle="#64748b";
        ctx.fillText(`${fmt(totals.sell,0)} / ${fmt(totals.buy,0)}`,x,Math.min(T+ph-8,y(b.low)+10));
      }

  }
}
function drawPrice(){
  const W=price.clientWidth,H=price.clientHeight; pctx.clearRect(0,0,W,H); pctx.fillStyle="#fbfcfe"; pctx.fillRect(0,0,W,H);
  if(!fps.length){ pctx.fillStyle="#94a3b8"; pctx.font="14px Segoe UI"; pctx.fillText("Run a backtest to view results", 20, H/2); return; }
  if(chartMode==="heatmap"){ drawHeatmap(pctx,price,"price"); const [s,e]=viewRange(); $("range").textContent=`bars ${s+1}-${e} / ${fps.length}`; return; }
  const [s,e]=viewRange(); const vis=fps.slice(s,e); const L=64,R=16,T=14,B=34; const pw=Math.max(1,W-L-R),ph=Math.max(1,H-T-B);
  let lo=Infinity,hi=-Infinity; for(const b of vis){lo=Math.min(lo,b.low);hi=Math.max(hi,b.high);}
  const pad=Math.max(0.25,(hi-lo)*0.06); lo-=pad;hi+=pad; [lo,hi]=applyYZoom("price",lo,hi); yZoom.price.lo=lo; yZoom.price.hi=hi; const y=p=>T+(hi-p)/(hi-lo)*ph; const xStep=pw/Math.max(1,vis.length); const cw=Math.max(1,Math.min(16,xStep*0.7)); const tick=tickSizeFor(vis);
  if(overlayOn("bands")){ let i=0; while(i<vis.length){ const band=(vis[i].plots||[]).find(p=>p.kind==="BackgroundBand"); const col=band?band.color:null; let j=i+1; const same=k=>{const bb=(vis[k].plots||[]).find(p=>p.kind==="BackgroundBand"); return (bb?bb.color:null)===col;}; while(j<vis.length&&same(j))j++; if(col){pctx.fillStyle=col; pctx.fillRect(L+i*xStep,T,(j-i)*xStep,ph);} i=j; } }
  pctx.strokeStyle=COLORS.grid; pctx.fillStyle=COLORS.axis; pctx.font="11px Segoe UI, Arial"; pctx.lineWidth=1;
  for(let i=0;i<=6;i++){ const yy=T+ph*i/6,pr=hi-(hi-lo)*i/6; pctx.beginPath();pctx.moveTo(L,yy);pctx.lineTo(W-R,yy);pctx.stroke(); pctx.fillText(pr.toFixed(2),6,yy+4); }
  drawTimeAxis(pctx,vis,L,T,pw,ph,W,R);
  const labelLayout={boxes:[],L,T,pw,ph};
  pctx.save(); clipPlot(pctx,L,T,pw,ph);
  if(chartMode==="footprint") drawFootprints(pctx,vis,L,T,ph,xStep,y,tick);
  else drawCandles(pctx,vis,L,T,ph,xStep,cw,y);
  drawPriceBoxes(pctx,vis,L,T,pw,ph,xStep,y,labelLayout);
  drawVolumeProfiles(pctx,vis,L,T,pw,ph,xStep,y,tick,labelLayout);
  drawPlotMarkers(pctx,vis,L,T,ph,xStep,y,labelLayout);
  if(overlayOn("trades")) drawTradePositions(pctx,trades,s,e,L,T,ph,xStep,y,labelLayout);

  if(hover&&hover.canvas==="price"){ const idx=clamp(Math.floor((hover.x-L)/xStep),0,vis.length-1); const b=vis[idx]; if(b){ const x=L+idx*xStep+xStep/2; pctx.strokeStyle="#111827";pctx.beginPath();pctx.moveTo(x,T);pctx.lineTo(x,T+ph);pctx.stroke(); const tags=b.tags?Object.entries(b.tags).map(([k,v])=>`${k}:${v}`).join(" "):""; const base=`${s+idx+1}/${fps.length}  ${fmtTs(b.ts_last_ns)}  O ${b.open.toFixed(2)} H ${b.high.toFixed(2)} L ${b.low.toFixed(2)} C ${b.close.toFixed(2)}  D ${fmt(b.delta,0)}  ${tags}`; if(chartMode==="footprint"){ const totals=footprintTotals(b); const priceAt=hi-(hover.y-T)/Math.max(1,ph)*(hi-lo); const lv=nearestFootprintLevel(b,priceAt); $("status").textContent=base+`  bar sell/buy ${fmt(totals.sell,0)}/${fmt(totals.buy,0)}  level ${lv?lv.price.toFixed(2):priceAt.toFixed(2)} sell/buy ${lv?fmt(lv.sell_vol,0):"-"}/${lv?fmt(lv.buy_vol,0):"-"}`; } else { $("status").textContent=base; } } }

function heatColor(v,maxAbs,metric){
  if(!(maxAbs>0)||!isFinite(v)||v<=0)return "rgba(148,163,184,0.03)";
  const n=Math.min(1,v/maxAbs), a=0.08+0.78*n;
  if(metric==="bid")return colorAlpha(COLORS.buy,a);
  if(metric==="ask")return colorAlpha(COLORS.sell,a);

}
function heatValue(level,metric){
  const bid=level.bid_size||0, ask=level.ask_size||0;
  if(metric==="bid")return bid;
  if(metric==="ask")return ask;
  return bid+ask;
}
function liquiditySnapshots(){ return (DATA&&DATA.liquidity_heatmap&&DATA.liquidity_heatmap.snapshots)||[]; }
function drawHeatmap(ctx,canvas,hoverCanvas){
  const W=canvas.clientWidth,H=canvas.clientHeight; ctx.clearRect(0,0,W,H); ctx.fillStyle="#f8fafc"; ctx.fillRect(0,0,W,H);
  if(!fps.length){ ctx.fillStyle="#94a3b8"; ctx.font="13px Segoe UI"; ctx.fillText("liquidity heatmap",20,H/2); return; }
  const depth=liquiditySnapshots();
  const [s,e]=viewRange(); const vis=fps.slice(s,e); const L=64,R=16,T=10,B=30; const pw=Math.max(1,W-L-R),ph=Math.max(1,H-T-B);
  let lo=Infinity,hi=-Infinity; for(const b of vis){lo=Math.min(lo,b.low);hi=Math.max(hi,b.high);} const pad=Math.max(0.25,(hi-lo)*0.06); lo-=pad;hi+=pad; [lo,hi]=applyYZoom("price",lo,hi); yZoom.price.lo=lo; yZoom.price.hi=hi;
  const y=p=>T+(hi-p)/(hi-lo)*ph, xStep=pw/Math.max(1,vis.length), tick=tickSizeFor(vis);
  ctx.strokeStyle=COLORS.grid; ctx.fillStyle=COLORS.axis; ctx.font="11px Segoe UI, Arial"; ctx.lineWidth=1;
  for(let i=0;i<=3;i++){ const yy=T+ph*i/3,pr=hi-(hi-lo)*i/3; ctx.beginPath();ctx.moveTo(L,yy);ctx.lineTo(W-R,yy);ctx.stroke(); ctx.fillText(pr.toFixed(2),6,yy+4); }
  if(!depth.length){
    ctx.fillStyle="#64748b"; ctx.font="12px Segoe UI, Arial"; ctx.fillText("No L2 resting-liquidity snapshots in this result",L+8,T+22);
  } else {
    const firstTs=Number(vis[0].ts_first_ns), lastTs=Number(vis[vis.length-1].ts_last_ns);
    const visibleDepth=depth.filter(d=>Number(d.ts_ns)>=firstTs&&Number(d.ts_ns)<=lastTs);
    let maxAbs=0;
    for(const d of visibleDepth){ for(const lv of (d.levels||[])){ maxAbs=Math.max(maxAbs,heatValue(lv,heatMetric)); } }
    for(const d of visibleDepth){
      const idx=clamp(idxForTs(d.ts_ns)-s,0,vis.length-1), x=L+idx*xStep, w=Math.max(1,xStep);
      for(const lv of (d.levels||[])){
        const top=y(lv.price+tick/2), bot=y(lv.price-tick/2); const yy=Math.min(top,bot), hh=Math.max(1,Math.abs(bot-top));
        if(yy>T+ph||yy+hh<T)continue;

      }
    }
  }

  const labelLayout={boxes:[],L,T,pw,ph};
  ctx.save(); clipPlot(ctx,L,T,pw,ph);
  drawPriceBoxes(ctx,vis,L,T,pw,ph,xStep,y,labelLayout);
  drawVolumeProfiles(ctx,vis,L,T,pw,ph,xStep,y,tick,labelLayout);
  drawPlotMarkers(ctx,vis,L,T,ph,xStep,y,labelLayout);
  if(overlayOn("trades")) drawTradePositions(ctx,trades,s,e,L,T,ph,xStep,y,labelLayout);
  ctx.restore();
  ctx.fillStyle="#334155"; ctx.font="11px Segoe UI, Arial"; ctx.fillText(`book liquidity: ${heatMetric}`,L+4,T+13);
  ctx.strokeStyle="#9aa4b2"; ctx.strokeRect(L,T,pw,ph);
  if(hover&&hover.canvas===hoverCanvas){
    const idx=clamp(Math.floor((hover.x-L)/xStep),0,vis.length-1); const b=vis[idx];
    if(b){ const x=L+idx*xStep+xStep/2; ctx.strokeStyle="#111827"; ctx.beginPath();ctx.moveTo(x,T);ctx.lineTo(x,T+ph);ctx.stroke(); const priceAt=hi-(hover.y-T)/Math.max(1,ph)*(hi-lo); const ts=Number(b.ts_last_ns); let snap=null; for(const d of depth){ if(Number(d.ts_ns)<=ts)snap=d; else break; } const nearest=snap?(snap.levels||[]).reduce((best,lv)=>!best||Math.abs(lv.price-priceAt)<Math.abs(best.price-priceAt)?lv:best,null):null; const hv=nearest?heatValue(nearest,heatMetric):0; $("status").textContent=`book ${s+idx+1}/${fps.length}  ${fmtTs(b.ts_last_ns)}  px ${nearest?nearest.price.toFixed(2):priceAt.toFixed(2)}  ${heatMetric} ${fmt(hv,0)}  bid ${nearest?fmt(nearest.bid_size,0):"-"} ask ${nearest?fmt(nearest.ask_size,0):"-"}`; }
  }
}
function drawEquity(){
  const W=equity.clientWidth,H=equity.clientHeight; ectx.clearRect(0,0,W,H); ectx.fillStyle="#fff"; ectx.fillRect(0,0,W,H);
  if(!eq.length)return; const [s,e]=viewRange();
  const vis=eq.slice(Math.min(s,eq.length-1),Math.min(e,eq.length));
  if(!vis.length)return;
  const L=64,R=16,T=12,B=30; const pw=Math.max(1,W-L-R),ph=Math.max(1,H-T-B);
  let lo=Infinity,hi=-Infinity; for(const p of vis){lo=Math.min(lo,p.equity);hi=Math.max(hi,p.equity);} if(!(isFinite(lo)&&isFinite(hi))||lo===hi){lo-=1;hi+=1;} const pad=(hi-lo)*0.08; lo-=pad;hi+=pad;
  [lo,hi]=applyYZoom("equity",lo,hi); yZoom.equity.lo=lo; yZoom.equity.hi=hi;
  const y=v=>T+(hi-v)/(hi-lo)*ph; const xStep=pw/Math.max(1,vis.length); const startEq=DATA&&DATA.metrics?DATA.metrics.starting_equity:(vis[0]?vis[0].equity:0);
  ectx.strokeStyle=COLORS.grid; ectx.fillStyle=COLORS.axis; ectx.font="11px Segoe UI, Arial";
  for(let i=0;i<=3;i++){ const yy=T+ph*i/3,vv=hi-(hi-lo)*i/3; ectx.beginPath();ectx.moveTo(L,yy);ectx.lineTo(W-R,yy);ectx.stroke(); ectx.fillText("$"+vv.toFixed(0),6,yy+4); }
  drawTimeAxis(ectx,vis,L,T,pw,ph,W,R,"ts_ns");
  ectx.save(); clipPlot(ectx,L,T,pw,ph);
  if(startEq>=lo&&startEq<=hi){ ectx.strokeStyle="#cbd5e1";ectx.setLineDash([4,4]); ectx.beginPath();ectx.moveTo(L,y(startEq));ectx.lineTo(W-R,y(startEq));ectx.stroke();ectx.setLineDash([]); }
  ectx.strokeStyle="#2563eb"; ectx.lineWidth=1.6; ectx.beginPath(); for(let i=0;i<vis.length;i++){const x=L+(i+0.5)*xStep,yy=y(vis[i].equity); i?ectx.lineTo(x,yy):ectx.moveTo(x,yy);} ectx.stroke(); ectx.lineWidth=1;
  ectx.restore();

function draw(){ drawPrice(); if(!equityCollapsed)drawEquity(); }

function attach(canvas,name){
  canvas.addEventListener("wheel",ev=>{ev.preventDefault(); const r=canvas.getBoundingClientRect(); const x=ev.clientX-r.left; if(ev.shiftKey||x<64){ const top=name==="price"?14:12,bottom=name==="price"?34:30; const frac=clamp((ev.clientY-r.top-top)/Math.max(1,r.height-top-bottom),0,1); zoomY(name,ev.deltaY<0?1.18:1/1.18,frac); } else { const ratio=clamp((x-64)/Math.max(1,r.width-80),0,1); setBarsPerView(barsPerView*(ev.deltaY<0?0.82:1.22),ratio); }},{passive:false});
  canvas.addEventListener("mousedown",ev=>{lockYZoom(name); const st=yZoom[name]; drag={x:ev.clientX,y:ev.clientY,start,name,lo:st?.lo,hi:st?.hi}; canvas.classList.add("dragging");});
  canvas.addEventListener("mousemove",ev=>{const r=canvas.getBoundingClientRect(); hover={canvas:name,x:ev.clientX-r.left,y:ev.clientY-r.top}; if(drag){const pw=Math.max(1,r.width-80); const d=Math.round((drag.x-ev.clientX)/pw*barsPerView); start=clamp(drag.start+d,0,Math.max(0,fps.length-barsPerView)); if(drag.name==="price")autoYZoom("equity"); if(drag.name===name&&isFinite(drag.lo)&&isFinite(drag.hi)&&drag.hi>drag.lo){ const top=name==="price"?14:12,bottom=name==="price"?34:30; const ph=Math.max(1,r.height-top-bottom); const dy=ev.clientY-drag.y; const shift=dy/ph*(drag.hi-drag.lo); const st=yZoom[name]; st.manual=true; st.lo=drag.lo+shift; st.hi=drag.hi+shift; }} draw();});
  canvas.addEventListener("mouseleave",()=>{hover=null;draw();});
}
window.addEventListener("mouseup",()=>{drag=null; price.classList.remove("dragging"); equity.classList.remove("dragging");});
splitter.addEventListener("mousedown",ev=>{
  splitDrag={y:ev.clientY,h:equity.getBoundingClientRect().height};
  splitter.classList.add("dragging");
  ev.preventDefault();
});
window.addEventListener("mousemove",ev=>{
  if(!splitDrag)return;
  const total=charts.getBoundingClientRect().height;
  const next=clamp(splitDrag.h-(ev.clientY-splitDrag.y),80,Math.max(80,total-180));
  charts.style.setProperty("--equity-height",`${Math.round(next)}px`);
  resize();
});
window.addEventListener("mouseup",()=>{splitDrag=null; splitter.classList.remove("dragging");});
attach(price,"price"); attach(equity,"equity");
$("tradeFirst").onclick=()=>jumpToTrade("first");
$("tradePrev").onclick=()=>jumpToTrade("prev");
$("tradeNext").onclick=()=>jumpToTrade("next");
$("tradeLast").onclick=()=>jumpToTrade("last");
$("modeCandles").onclick=()=>setChartMode("candles");
$("modeFootprint").onclick=()=>setChartMode("footprint");
$("modeHeatmap").onclick=()=>setChartMode("heatmap");
$("heatMetric").onchange=e=>{heatMetric=e.target.value;draw();};
$("toggleEquity").onclick=()=>setEquityCollapsed(!equityCollapsed);
setEquityCollapsed(equityCollapsed,false);
$("runBtn").onclick=runBacktest;
$("saveBtn").onclick=async()=>{ const name=$("saveName").value.trim(); if(!name){$("runErr").textContent="Enter a save name";return;} const r=await (await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})})).json(); if(!r.ok){$("runErr").textContent=r.error||"save failed";} else { $("saveName").value=""; refreshRuns(); } };
window.addEventListener("resize",resize);

async function init(){
  document.body.classList.add("viewer");
  $("status").textContent="result viewer";
  resize();
  try{ await loadResult(); }
  catch(err){ $("status").textContent="Unable to load result: "+(err&&err.message?err.message:err); }
}
init();
</script>
