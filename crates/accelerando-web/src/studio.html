<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accelerando - backtest studio</title>
<style>
  :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background:#f6f7f9; color:#111827; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
  header { padding:10px 16px; background:#0f172a; color:#fff; display:flex; align-items:baseline; gap:12px; }
  header .title { font-size:16px; font-weight:800; letter-spacing:.3px; }
  header .brand-home { color:#fff; text-decoration:none; flex:0 0 auto; }
  header .brand-home:hover { text-decoration:underline; }
  header .tag { font-size:12px; color:#94a3b8; }
  header .status { margin-left:auto; font-size:12px; color:#cbd5e1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:55vw;}
  .main { display:grid; grid-template-columns:360px 1fr; min-height:0; }
  body.viewer .main { grid-template-columns:1fr; }
  body.viewer .side { display:none; }
  .side { border-right:1px solid #e2e8f0; background:#fff; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
  .panel { border:1px solid #e5e7eb; border-radius:10px; background:#fbfcfe; }
  .panel > h3 { margin:0; padding:8px 12px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:#475569; border-bottom:1px solid #eef2f7; }
  .panel .body { padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  .runbar { display:flex; gap:8px; align-items:center; }
  button { border:1px solid #c5ccd6; border-radius:8px; background:#fff; cursor:pointer; font-size:13px; padding:7px 12px; }
  button:hover { background:#eef2f7; }
  button.primary { background:#2563eb; border-color:#2563eb; color:#fff; font-weight:700; }
  button.primary:disabled { background:#94a3b8; border-color:#94a3b8; cursor:not-allowed; }
  .progress { height:10px; border-radius:6px; background:#e5e7eb; overflow:hidden; flex:1; }
  .progress > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#06b6d4,#2563eb); transition:width .15s; }
  .prog-text { font-size:11px; color:#475569; min-height:14px; }
  label.f { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:12px; color:#374151; }
  label.f input, label.f select { width:150px; padding:4px 6px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; }
  details { border:1px solid #eef2f7; border-radius:8px; }
  details > summary { cursor:pointer; padding:6px 10px; font-size:12px; font-weight:600; color:#334155; }
  details .body { padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  .runs { display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto; }
  .run { display:flex; justify-content:space-between; gap:6px; padding:6px 8px; border:1px solid #eef2f7; border-radius:6px; cursor:pointer; font-size:12px; }
  .run:hover { background:#eff6ff; border-color:#bfdbfe; }
  .run .nm { font-weight:600; }
  .run .mt { color:#64748b; }
  .pos { color:#2563eb; } .neg { color:#d97706; }
  .err { color:#b45309; font-size:12px; }
  .content { display:grid; grid-template-rows:auto auto auto 1fr; min-height:0; }
  .cards { display:flex; gap:8px; flex-wrap:wrap; padding:10px 14px; background:#fff; border-bottom:1px solid #e2e8f0; }
  .cards.collapsed { padding:0; border-bottom:0; }
  .cards.collapsed > * { display:none; }
  .card { min-width:104px; padding:6px 10px; border:1px solid #e5e7eb; border-radius:8px; background:#fbfcfe; }
  .card .k { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:.4px; }
  .card .v { font-size:16px; font-weight:700; margin-top:2px; }
  .run-meta { display:none; background:#fff; border-bottom:1px solid #e2e8f0; }
  .run-meta.visible { display:block; }
  .run-meta-bar { display:flex; align-items:center; gap:8px; min-height:34px; padding:5px 14px; border-bottom:1px solid #eef2f7; }
  .run-meta.collapsed .run-meta-bar { border-bottom:0; }
  .run-meta-title { font-size:12px; font-weight:800; color:#334155; text-transform:uppercase; letter-spacing:.4px; }
  .run-meta-sub { min-width:0; color:#64748b; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta-toggle { height:24px; min-width:62px; padding:0 8px; border-radius:6px; font-size:12px; }
  .run-meta-body { display:flex; padding:8px 14px; gap:8px; flex-wrap:wrap; align-items:stretch; }
  .run-meta.collapsed .run-meta-body { display:none; }
  .run-meta .meta-head { min-width:180px; padding:6px 8px; border:1px solid #e5e7eb; border-radius:8px; background:#fbfcfe; }
  .run-meta .meta-head b { display:block; font-size:13px; }
  .run-meta .meta-head span { display:block; margin-top:2px; font-size:11px; color:#64748b; }
  .run-meta .meta-group { min-width:220px; max-width:420px; flex:1 1 260px; padding:6px 8px; border:1px solid #eef2f7; border-radius:8px; background:#fbfcfe; }
  .run-meta .meta-title { font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:.4px; font-weight:800; margin-bottom:5px; }
  .run-meta .meta-items { display:flex; flex-wrap:wrap; gap:5px; }
  .run-meta .meta-param { display:inline-flex; gap:4px; max-width:100%; padding:2px 5px; border:1px solid #e5e7eb; border-radius:6px; background:#fff; font-size:11px; }
  .run-meta .meta-param b { color:#475569; font-weight:600; overflow:hidden; text-overflow:ellipsis; }
  .run-meta .meta-param span { font-family:Consolas,"SFMono-Regular",monospace; overflow:hidden; text-overflow:ellipsis; }
  .toolbar { display:flex; align-items:center; gap:8px; padding:6px 14px; background:#fff; border-bottom:1px solid #e2e8f0; }
  .toolbar .rng { margin-left:auto; font-size:12px; color:#475569; }
  .toolbar button.tool-toggle { height:28px; padding:0 10px; border-radius:8px; }
  .toolbar button.tool-toggle.active { background:#0f172a; border-color:#0f172a; color:#fff; }
  .seg { display:inline-flex; border:1px solid #cbd5e1; border-radius:8px; overflow:hidden; background:#fff; }
  .seg button { border:0; border-radius:0; height:28px; padding:0 10px; }
  .seg button + button { border-left:1px solid #cbd5e1; }
  .seg button.active { background:#0f172a; color:#fff; }
  .charts { --equity-height:180px; position:relative; display:grid; grid-template-rows:minmax(160px,1fr) 7px minmax(80px,var(--equity-height)); min-height:0; }
  .charts.equity-collapsed { grid-template-rows:minmax(160px,1fr) 0 0; }
  .charts.equity-collapsed .splitter, .charts.equity-collapsed #equity { display:none; }
  .splitter { height:7px; cursor:row-resize; background:#eef2f7; border-top:1px solid #cbd5e1; border-bottom:1px solid #cbd5e1; }
  .splitter:hover, .splitter.dragging { background:#dbeafe; }
  canvas { display:block; width:100%; height:100%; background:#fbfcfe; cursor:grab; }
  canvas.dragging { cursor:grabbing; }
  .chart-area { display:grid; grid-template-columns:46px 1fr; min-height:0; }
  .chart-tools { display:flex; flex-direction:column; align-items:center; gap:8px; padding:8px 5px; background:#fff; border-right:1px solid #e2e8f0; }
  .chart-tools button { width:34px; height:34px; padding:0; font-size:16px; line-height:1; border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .chart-tools button.active { background:#0f172a; border-color:#0f172a; color:#fff; }
  .chart-tools button.tool-label { font-size:12px; font-weight:800; }
  .anno-tools { display:none; align-items:center; gap:6px; padding:2px 6px; border:1px solid #cbd5e1; border-radius:8px; background:#f8fafc; }
  .anno-tools.visible { display:inline-flex; }
  .anno-tools select { height:26px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; background:#fff; }
  .anno-tools button { height:26px; padding:0 8px; border-radius:6px; font-size:12px; }
  .anno-hint { font-size:11px; color:#475569; white-space:nowrap; }
  .annotation-help { display:none; position:absolute; left:16px; top:12px; z-index:4; max-width:min(760px,calc(100% - 150px)); padding:7px 9px; border:1px solid #cbd5e1; border-radius:8px; background:rgba(255,255,255,0.94); color:#334155; box-shadow:0 2px 8px rgba(15,23,42,0.12); font-size:12px; line-height:1.35; pointer-events:none; }
  .annotation-help.visible { display:block; }
  .annotation-help b { color:#0f172a; }
  .ff-event-popover { display:none; position:absolute; z-index:6; width:min(380px,calc(100% - 24px)); max-height:min(430px,calc(100% - 24px)); overflow:auto; padding:14px 16px 14px 18px; border-left:4px solid #a855f7; border-radius:8px; background:#fff; color:#111827; box-shadow:0 12px 32px rgba(15,23,42,0.24); font-size:12px; line-height:1.35; }
  .ff-event-popover.visible { display:block; }
  .ff-event-popover .ff-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-weight:800; font-size:15px; }
  .ff-event-popover .ff-bolt { display:inline-flex; width:24px; height:24px; align-items:center; justify-content:center; border:1px solid #a855f7; border-radius:50%; color:#a855f7; font-size:16px; line-height:1; }
  .ff-event-popover .ff-time { color:#64748b; font-size:12px; font-weight:500; }
  .ff-event-popover .ff-item { padding:10px 0; border-top:1px solid #eef2f7; }
  .ff-event-popover .ff-title { font-weight:750; font-size:13px; color:#111827; }
  .empty { display:flex; align-items:center; justify-content:center; height:100%; color:#94a3b8; font-size:14px; }
</style>
</head>
<body class="viewer">
<header>
  <a class="title brand-home" href="/" title="Back to home">ACCELERANDO</a>
  <span class="tag">studio - the world has been accelerated</span>
  <span class="status" id="status"></span>
</header>
<div class="main">
  <aside class="side">
    <div class="panel">
      <h3>run</h3>
      <div class="body">
        <div class="runbar">
          <button class="primary" id="runBtn" style="flex:0 0 auto;">Run</button>
          <div class="progress"><i id="progBar"></i></div>
        </div>
        <div class="prog-text" id="progText"></div>
        <div class="err" id="runErr"></div>
        <div class="runbar">
          <input id="saveName" placeholder="Save name..." style="flex:1; padding:6px 8px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px;">
          <button id="saveBtn">Save</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3>saved runs</h3>
      <div class="body"><div class="runs" id="runs"></div></div>
    </div>

    <div class="panel">
      <h3>config</h3>
      <div class="body" id="form"></div>
    </div>
  </aside>

  <section class="content">
    <div class="cards" id="cards"></div>
    <div class="run-meta" id="runMeta"></div>
    <div class="toolbar">
      <span class="seg" aria-label="trade navigation">
        <button id="tradeFirst" title="Jump to first trade">First</button>
        <button id="tradePrev" title="Jump to previous trade">Previous</button>
        <button id="tradeNext" title="Jump to next trade">Next</button>
        <button id="tradeLast" title="Jump to last trade">Last</button>
      </span>
      <span class="seg" aria-label="chart mode">
        <button id="modeCandles" class="active" title="Candlestick chart">Candles</button>
        <button id="modeFootprint" title="Footprint chart">Footprint</button>
        <button id="modeHeatmap" title="L2 heatmap chart">Heatmap</button>
      </span>
      <span id="overlayToggles" style="display:inline-flex;gap:10px;align-items:center;flex-wrap:wrap;"></span>
      <label style="font-size:12px;color:#374151;display:inline-flex;gap:6px;align-items:center;">heat <select id="heatMetric" style="height:26px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;"><option value="total">total</option><option value="bid">bid</option><option value="ask">ask</option></select></label>
      <button id="toggleMetrics" class="tool-toggle active" type="button" title="Hide metrics" aria-pressed="true">Metrics</button>
      <button id="toggleEquity" class="tool-toggle active" type="button" title="Hide equity" aria-pressed="true">Equity</button>
      <span id="annoTools" class="anno-tools">
        <select id="annoLabel" title="Annotation label"></select>
        <button id="annoSave" type="button" title="Save current box (Enter)" disabled>Save</button>
        <button id="annoCancel" type="button" title="Cancel current box (Esc)" disabled>Cancel</button>
        <span id="annoHint" class="anno-hint"></span>
      </span>
      <span class="rng" id="range"></span>
    </div>
    <div class="chart-area">
      <div class="chart-tools">
        <button id="toggleCross" type="button" title="Crosshair (C)" aria-pressed="true">&#10011;</button>
        <button id="centerPrice" type="button" title="Center current price" aria-label="Center current price">&#8853;</button>
        <button id="toggleVp" class="tool-label" type="button" title="Volume profile: drag a box, click an existing one to remove it (V)" aria-pressed="false">VP</button>
        <button id="toggleAnnotate" type="button" title="Toggle annotation mode (A)" aria-pressed="false" style="display:none;">&#9998;</button>
      </div>
      <div class="charts">
        <div id="annotationHelp" class="annotation-help"></div>
        <div id="ffEventPopover" class="ff-event-popover"></div>
        <canvas id="price"></canvas>
        <div id="chartSplitter" class="splitter" title="Drag to resize charts"></div>
        <canvas id="equity"></canvas>
      </div>
    </div>
  </section>
</div>
<script>
const COLORS = { up:"#6d6dff", down:"#ff6d6d", buy:"#6d6dff", sell:"#ff6d6d", tradeText:"#ffffff", grid:"#e2e8f0", axis:"#475569" };
// TradingView-style layout: thin left padding, price axis on the right.
const AXIS_W=64, PADL=8;
let SCHEMA=null, CONFIG=null, DATA=null, fps=[], eq=[], trades=[];
let barsPerView=300, start=0, hover=null, drag=null, splitDrag=null, chartMode="candles", heatMetric="total", poll=null;
// Overlay visibility, keyed by category ("bands", "trades", or a marker group). Persisted across
// re-renders so a hidden overlay stays hidden when the result is reloaded.
let overlayState={};
let annotationConfig={enabled:false,labels:[]};
let annotations=[], annotationMode=false, annotationDraft=null, priceScale=null;
let econEventGroups=[], econEventMarkers=[], pinnedEconEvent=null;
// User-drawn volume/delta profiles (Fixed Range Volume Profile, TradingView-style): drag a box on
// the price chart to add one, click an existing one to remove it. Client-side only (computed from
// the already-loaded footprint ladders), not persisted across reloads.
let vpProfiles=[], vpMode=false, vpDraft=null;
const overlayLabel=cat=>cat==="bands"?"bands":cat==="trades"?"trades":cat==="ff_high_events"?"High events":cat.replace(/_/g," ");
const overlayOn=cat=>overlayState[cat]!==false;
const markerCat=p=>p.group||"markers";
const volumeProfileCat=p=>(p.id||"").startsWith("entry_vp_")?"entry_vp":"volume_profiles";
const priceBoxCat=p=>p.group||"price_boxes";
let yZoom={price:{manual:false,lo:null,hi:null},equity:{manual:false,lo:null,hi:null}};
const $ = id => document.getElementById(id);
const price=$("price"), pctx=price.getContext("2d");
const equity=$("equity"), ectx=equity.getContext("2d");
const charts=document.querySelector(".charts"), splitter=$("chartSplitter");
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function readStoredBool(key,fallback=false){ try{ const v=localStorage.getItem(key); return v===null?fallback:v==="1"; } catch(_){ return fallback; } }
function writeStoredBool(key,value){ try{ localStorage.setItem(key,value?"1":"0"); } catch(_){} }
let metaCollapsed=readStoredBool("accelerando.runMetaCollapsed",false);
let equityCollapsed=readStoredBool("accelerando.equityCollapsed",false);
let cardsCollapsed=readStoredBool("accelerando.cardsCollapsed",false);
let crosshairOn=readStoredBool("accelerando.crosshair",true);
const fmt=(n,d=2)=>(n===null||n===undefined||!isFinite(n))?"-":Number(n).toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d});
const fmtTs=ns=>new Date(Number(ns)/1e6).toLocaleString();
const fmtAxisTs=ns=>new Date(Number(ns)/1e6).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
const sc=n=>n>=0?"pos":"neg";
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function fmtParam(v){
  if(v===null||v===undefined)return "-";
  if(typeof v==="number")return Number.isInteger(v)?String(v):fmt(v,4);
  if(typeof v==="boolean")return v?"true":"false";
  return esc(v);
}
function flattenParams(value,prefix="",out=[]){
  if(value===null||value===undefined)return out;
  if(Array.isArray(value)){ value.forEach((item,i)=>flattenParams(item,prefix||String(i+1),out)); return out; }
  if(typeof value==="object"){
    if(value.adapter&&value.params&&typeof value.params==="object"){
      flattenParams(value.params,prefix?`${prefix}.${value.adapter}`:value.adapter,out);
      return out;
    }
    for(const [k,v] of Object.entries(value)){ if(k!=="adapter")flattenParams(v,prefix?`${prefix}.${k}`:k,out); }
    return out;
  }
  out.push({key:prefix,value});
  return out;
}
function groupedParams(params){
  const groups=[];
  for(const item of flattenParams(params||{})){
    const parts=item.key.split(".");
    const name=parts.pop()||item.key;
    const group=parts.join(".")||"params";
    let g=groups.find(x=>x.name===group);
    if(!g){ g={name:group,items:[]}; groups.push(g); }
    g.items.push({name,value:item.value});
  }
  return groups;
}
function renderRunMeta(){
  const host=$("runMeta"); if(!host)return;
  const summary=typeof RUN_SUMMARY==="object"?RUN_SUMMARY:null;
  if(!summary){ host.classList.remove("visible"); host.innerHTML=""; return; }
  const groups=groupedParams(summary.params);
  host.classList.add("visible");
  const label=summary.label||summary.id||"run", strategy=summary.strategy||"";
  host.innerHTML=`<div class="run-meta-bar"><button id="toggleRunMeta" class="meta-toggle" type="button" aria-expanded="${String(!metaCollapsed)}"></button><div class="run-meta-title">Parameters</div><div class="run-meta-sub">${esc(label)}${strategy?` - ${esc(strategy)}`:""}</div></div>`+
    `<div class="run-meta-body"><div class="meta-head"><b>${esc(label)}</b><span>${esc(strategy)}</span></div>`+
    groups.map(g=>`<div class="meta-group"><div class="meta-title">${esc(g.name)}</div><div class="meta-items">${g.items.map(p=>`<span class="meta-param" title="${esc(p.name)} = ${esc(fmtParam(p.value))}"><b>${esc(p.name)}</b><span>${fmtParam(p.value)}</span></span>`).join("")}</div></div>`).join("")+
    `</div>`;
  $("toggleRunMeta").onclick=()=>setMetaCollapsed(!metaCollapsed);
  setMetaCollapsed(metaCollapsed,false);
}

function setMetaCollapsed(collapsed,persist=true){
  metaCollapsed=!!collapsed;
  const host=$("runMeta");
  if(host){
    host.classList.toggle("collapsed",metaCollapsed);
    const btn=$("toggleRunMeta");
    if(btn){
      btn.textContent=metaCollapsed?"Show params":"Hide params";
      btn.title=metaCollapsed?"Show parameter panel":"Hide parameter panel";
      btn.setAttribute("aria-expanded",String(!metaCollapsed));
    }
  }
  if(persist)writeStoredBool("accelerando.runMetaCollapsed",metaCollapsed);
  requestAnimationFrame(resize);
}

function setCardsCollapsed(collapsed,persist=true){
  cardsCollapsed=!!collapsed;
  const host=$("cards");
  if(host)host.classList.toggle("collapsed",cardsCollapsed);
  const btn=$("toggleMetrics");
  if(btn){
    btn.classList.toggle("active",!cardsCollapsed);
    btn.title=cardsCollapsed?"Show metrics":"Hide metrics";
    btn.setAttribute("aria-pressed",String(!cardsCollapsed));
  }
  if(persist)writeStoredBool("accelerando.cardsCollapsed",cardsCollapsed);
  requestAnimationFrame(resize);
}

function setEquityCollapsed(collapsed,persist=true){
  equityCollapsed=!!collapsed;
  charts.classList.toggle("equity-collapsed",equityCollapsed);
  const btn=$("toggleEquity");
  if(btn){
    btn.classList.toggle("active",!equityCollapsed);
    btn.title=equityCollapsed?"Show equity":"Hide equity";
    btn.setAttribute("aria-pressed",String(!equityCollapsed));
  }
  if(equityCollapsed){
    if(hover&&hover.canvas==="equity")hover=null;
    splitDrag=null;
    splitter.classList.remove("dragging");
  }
  if(persist)writeStoredBool("accelerando.equityCollapsed",equityCollapsed);
  requestAnimationFrame(resize);
}

function resetYZoom(){ yZoom={price:{manual:false,lo:null,hi:null},equity:{manual:false,lo:null,hi:null}}; }
function applyYZoom(name,lo,hi){
  if(!(isFinite(lo)&&isFinite(hi))||lo===hi){lo-=1;hi+=1;}
  const st=yZoom[name];
  if(st.manual&&isFinite(st.lo)&&isFinite(st.hi)&&st.hi>st.lo)return [st.lo,st.hi];
  st.lo=lo; st.hi=hi;
  return [lo,hi];
}
function lockYZoom(name){ const st=yZoom[name]; if(st&&isFinite(st.lo)&&isFinite(st.hi)&&st.hi>st.lo)st.manual=true; }
function autoYZoom(name){ const st=yZoom[name]; if(st)st.manual=false; }
function zoomY(name,factor,frac){
  const st=yZoom[name]; if(!st||st.lo==null||st.hi==null)return;
  const oldLo=st.lo, oldHi=st.hi, oldSpan=oldHi-oldLo; if(!(oldSpan>0))return;
  const nextSpan=clamp(oldSpan/factor,1e-12,1e18);
  const anchor=oldHi-frac*oldSpan;
  const nextLo=anchor-(1-frac)*nextSpan;
  st.manual=true; st.lo=nextLo; st.hi=nextLo+nextSpan;
  draw();
}
function drawTimeAxis(ctx,vis,L,T,pw,ph,W,R,tsKey="ts_last_ns",xStep=pw/Math.max(1,vis.length)){
  if(!vis.length)return;
  ctx.save(); ctx.strokeStyle=COLORS.grid; ctx.fillStyle=COLORS.axis; ctx.font="10px Segoe UI, Arial"; ctx.textAlign="center"; ctx.textBaseline="top";
  const ticks=Math.min(5,vis.length);
  for(let i=0;i<ticks;i++){
    const idx=ticks===1?0:Math.round((vis.length-1)*i/(ticks-1));
    const x=L+(idx+0.5)*xStep;
    const ts=vis[idx][tsKey]??vis[idx].ts_last_ns??vis[idx].ts_ns;
    ctx.beginPath();ctx.moveTo(x,T+ph);ctx.lineTo(x,T+ph+4);ctx.stroke();

function idxForTs(ns){ const x=Number(ns); let lo=0,hi=fps.length-1,best=0; while(lo<=hi){const m=(lo+hi)>>1; if(Number(fps[m].ts_last_ns)<=x){best=m;lo=m+1;}else hi=m-1;} return best; }

function drawEconomicEvents(ctx,s,e,L,T,pw,ph,xStep){

function footprintTotals(b){

}

// Bookmap-style heat ramp: dark depth base -> blue -> cyan -> red -> yellow as resting size grows.
// ===== Zoomable, server-windowed Bookmap heatmap =====
// The first stop is opaque instead of transparent so zero-liquidity buckets do not expose hard
// canvas gaps; neighbouring interpolation then gives the continuous Bookmap-like look.
const HEAT_LUT=(()=>{
  const stops=[[0,[5,24,36,255]],[0.04,[6,44,66,255]],[0.16,[7,78,105,255]],[0.32,[0,126,142,255]],[0.50,[0,174,144,255]],[0.67,[245,58,24,255]],[0.84,[255,128,0,255]],[1,[255,242,38,255]]];

  for(let i=0;i<256;i++){ const n=i/255; let c=[0,0,0,0];

    lut[i*4]=c[0];lut[i*4+1]=c[1];lut[i*4+2]=c[2];lut[i*4+3]=c[3]; }

let heatCanvas=null, heatView=null, heatData=null, heatImg=null, heatPending=false, heatTimer=null, heatReqId=0;

function initHeatView(){

}
// Heatmap zoom/pan operate on the time/price window (heatView), then refetch a fresh raster.
function heatZoomTime(factor,fx){ const v=heatView; if(!v)return; const sp=heatDataSpan(); const span=v.t1-v.t0; let ns=Math.max(2e9,Math.min(span*factor,(sp.t1-sp.t0)*1.25)); const center=v.t0+fx*span; v.t0=center-fx*ns; v.t1=center+(1-fx)*ns; }
function heatZoomPrice(factor,fy){ const v=heatView; if(!v)return; const span=v.pmax-v.pmin; const sp=Math.max(0.5,span*factor); const center=v.pmax-fy*span; v.pmin=center-(1-fy)*sp; v.pmax=center+fy*sp; }
function heatPan(dxPx,dyPx,pw,ph,base){ const v=heatView; if(!v||!base)return; const dt=-dxPx/Math.max(1,pw)*(base.t1-base.t0); v.t0=base.t0+dt; v.t1=base.t1+dt; const dp=dyPx/Math.max(1,ph)*(base.pmax-base.pmin); v.pmin=base.pmin+dp; v.pmax=base.pmax+dp; }
function drawHeatmap(ctx,canvas,hoverCanvas){
  const W=canvas.clientWidth,H=canvas.clientHeight; ctx.clearRect(0,0,W,H); ctx.fillStyle="#070b14"; ctx.fillRect(0,0,W,H);
  if(!fps.length){ ctx.fillStyle="#94a3b8"; ctx.font="13px Segoe UI"; ctx.fillText("liquidity heatmap",20,H/2); return; }
  if(!heatView){ initHeatView(); ensureHeat(); }
  const L=PADL,R=AXIS_W,T=10,B=30,pw=Math.max(1,W-L-R),ph=Math.max(1,H-T-B),v=heatView;
  const y=p=>T+(v.pmax-p)/Math.max(1e-9,v.pmax-v.pmin)*ph, xT=t=>L+(t-v.t0)/Math.max(1,v.t1-v.t0)*pw;
  ctx.strokeStyle="rgba(148,163,184,0.14)"; ctx.fillStyle="#94a3b8"; ctx.font="11px Segoe UI,Arial"; ctx.lineWidth=1; ctx.textAlign="left";
  for(let i=0;i<=4;i++){ const yy=T+ph*i/4,pr=v.pmax-(v.pmax-v.pmin)*i/4; ctx.beginPath();ctx.moveTo(L,yy);ctx.lineTo(W-R,yy);ctx.stroke(); ctx.fillText(pr.toFixed(2),W-R+6,yy+4); }
  if(heatImg&&heatData){ ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality="high"; const dx0=xT(heatData.t0_ns),dx1=xT(heatData.t1_ns),dy0=y(heatData.pmax),dy1=y(heatData.pmin); ctx.save(); ctx.beginPath(); ctx.rect(L,T,pw,ph); ctx.clip(); ctx.drawImage(heatImg,dx0,dy0,Math.max(1,dx1-dx0),Math.max(1,dy1-dy0)); ctx.restore(); }
  else { ctx.fillStyle="#cbd5e1"; ctx.font="12px Segoe UI,Arial"; ctx.fillText(heatPending?"loading heatmap...":"no heatmap data (run with --serve)",L+8,T+22); }
  drawHeatTimeAxis(ctx,L,T,pw,ph,W,R,v.t0,v.t1);
  if(heatData)drawHeatTraces(ctx,heatData,L,T,pw,ph,xT,y);
  ctx.strokeStyle="#1e293b"; ctx.strokeRect(L,T,pw,ph);
  ctx.fillStyle="#cbd5e1"; ctx.font="11px Segoe UI,Arial"; ctx.fillText(`book ${heatMetric}${heatPending?" - loading...":""}  -  drag = pan - wheel = zoom time - shift/left-edge wheel = zoom price`,L+4,T+13);
  $("range").textContent=`${fmtTs(v.t0)}  ->  ${fmtTs(v.t1)}`;
  if(hover&&hover.canvas===hoverCanvas&&hover.x>=L&&hover.x<=L+pw&&hover.y>=T&&hover.y<=T+ph){
    const x=hover.x, tAt=v.t0+(x-L)/pw*(v.t1-v.t0), pAt=v.pmax-(hover.y-T)/Math.max(1,ph)*(v.pmax-v.pmin);
    if(crosshairOn){
      ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle="rgba(255,255,255,0.35)"; ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,T);ctx.lineTo(x,T+ph);ctx.stroke();
      ctx.beginPath();ctx.moveTo(L,hover.y);ctx.lineTo(L+pw,hover.y);ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
      axisPriceTag(ctx,W,R,hover.y,pAt.toFixed(2),"#334155");
      axisTimeTag(ctx,x,T+ph,fmtHeatAxis(tAt,v.t1-v.t0),L,pw);
    }
    $("status").textContent=`${fmtTs(tAt)}   px ${pAt.toFixed(2)}`;
  }
}
function drawEquity(){
  const W=equity.clientWidth,H=equity.clientHeight; ectx.clearRect(0,0,W,H); ectx.fillStyle="#fff"; ectx.fillRect(0,0,W,H);
  if(!eq.length)return; const [s,e]=viewRange();
  const vis=eq.slice(Math.min(s,eq.length-1),Math.min(e,eq.length));
  if(!vis.length)return;
  const L=PADL,R=AXIS_W,T=12,B=30; const pw=Math.max(1,W-L-R),ph=Math.max(1,H-T-B);
  let lo=Infinity,hi=-Infinity; for(const p of vis){lo=Math.min(lo,p.equity);hi=Math.max(hi,p.equity);} if(!(isFinite(lo)&&isFinite(hi))||lo===hi){lo-=1;hi+=1;} const pad=(hi-lo)*0.08; lo-=pad;hi+=pad;
  [lo,hi]=applyYZoom("equity",lo,hi); yZoom.equity.lo=lo; yZoom.equity.hi=hi;
  const y=v=>T+(hi-v)/(hi-lo)*ph; const xStep=pw/Math.max(1,barsPerView); const startEq=DATA&&DATA.metrics?DATA.metrics.starting_equity:(vis[0]?vis[0].equity:0);
  ectx.strokeStyle=COLORS.grid; ectx.fillStyle=COLORS.axis; ectx.font="11px Segoe UI, Arial";
  for(let i=0;i<=3;i++){ const yy=T+ph*i/3,vv=hi-(hi-lo)*i/3; ectx.beginPath();ectx.moveTo(L,yy);ectx.lineTo(W-R,yy);ectx.stroke(); ectx.fillText("$"+vv.toFixed(0),W-R+6,yy+4); }
  drawTimeAxis(ectx,vis,L,T,pw,ph,W,R,"ts_ns",xStep);
  ectx.save(); clipPlot(ectx,L,T,pw,ph);
  if(startEq>=lo&&startEq<=hi){ ectx.strokeStyle="#cbd5e1";ectx.setLineDash([4,4]); ectx.beginPath();ectx.moveTo(L,y(startEq));ectx.lineTo(W-R,y(startEq));ectx.stroke();ectx.setLineDash([]); }
  ectx.strokeStyle="#2563eb"; ectx.lineWidth=1.6; ectx.beginPath(); for(let i=0;i<vis.length;i++){const x=L+(i+0.5)*xStep,yy=y(vis[i].equity); i?ectx.lineTo(x,yy):ectx.moveTo(x,yy);} ectx.stroke(); ectx.lineWidth=1;
  ectx.restore();
  ectx.fillStyle="#64748b"; ectx.fillText("equity",L+4,T+12); ectx.strokeStyle="#9aa4b2"; ectx.strokeRect(L,T,pw,ph);
  // Crosshair: vertical line synced with the price chart; full cross + $ tag when hovering here.
  if(crosshairOn&&hover&&(hover.canvas==="price"||hover.canvas==="equity")&&hover.x>=L&&hover.x<=L+pw){
    const idx=clamp(Math.floor((hover.x-L)/xStep),0,vis.length-1);
    const x=L+idx*xStep+xStep/2;
    ectx.save(); ectx.setLineDash([4,4]); ectx.strokeStyle="rgba(71,85,105,0.6)"; ectx.lineWidth=1;
    ectx.beginPath();ectx.moveTo(x,T);ectx.lineTo(x,T+ph);ectx.stroke();
    if(hover.canvas==="equity"&&hover.y>=T&&hover.y<=T+ph){
      ectx.beginPath();ectx.moveTo(L,hover.y);ectx.lineTo(L+pw,hover.y);ectx.stroke();
      ectx.setLineDash([]);
      const vv=hi-(hover.y-T)/Math.max(1,ph)*(hi-lo);
      axisPriceTag(ectx,W,R,hover.y,"$"+vv.toFixed(0),"#334155");
    }
    ectx.restore();
  }
}
function draw(){ drawPrice(); if(!equityCollapsed)drawEquity(); }

function attach(canvas,name){
  canvas.addEventListener("wheel",ev=>{ev.preventDefault(); const r=canvas.getBoundingClientRect(); const x=ev.clientX-r.left;
    if(chartMode==="heatmap"&&name==="price"&&heatView){ const L=PADL,top=10,bottom=30,pw=Math.max(1,r.width-L-AXIS_W),ph=Math.max(1,r.height-top-bottom),factor=ev.deltaY<0?0.82:1.22; if(ev.shiftKey||x>r.width-AXIS_W){ heatZoomPrice(factor,clamp((ev.clientY-r.top-top)/ph,0,1)); } else { heatZoomTime(factor,clamp((x-L)/pw,0,1)); } draw(); scheduleHeatFetch(); return; }
    if(ev.shiftKey||x>r.width-AXIS_W){ const top=name==="price"?14:12,bottom=name==="price"?34:30; const frac=clamp((ev.clientY-r.top-top)/Math.max(1,r.height-top-bottom),0,1); zoomY(name,ev.deltaY<0?1.18:1/1.18,frac); } else { const ratio=clamp((x-PADL)/Math.max(1,r.width-PADL-AXIS_W),0,1); setBarsPerView(barsPerView*(ev.deltaY<0?0.82:1.22),ratio); }},{passive:false});
  canvas.addEventListener("mousedown",ev=>{ if(annotationMode&&name==="price"&&chartMode!=="heatmap"&&ev.button===0){ startAnnotationDraft(ev); return; } if(vpMode&&name==="price"&&chartMode!=="heatmap"&&ev.button===0){ startVpDraft(ev); return; } lockYZoom(name); const st=yZoom[name]; drag={x:ev.clientX,y:ev.clientY,start,name,lo:st?.lo,hi:st?.hi,heat:(chartMode==="heatmap"&&heatView)?{t0:heatView.t0,t1:heatView.t1,pmin:heatView.pmin,pmax:heatView.pmax}:null}; canvas.classList.add("dragging");});
  canvas.addEventListener("mousemove",ev=>{const r=canvas.getBoundingClientRect(); hover={canvas:name,x:ev.clientX-r.left,y:ev.clientY-r.top};
    if(name==="price"&&!pinnedEconEvent){
      const hit=hitEconomicEventMarker(hover.x,hover.y);
      if(hit)showEconomicEventPopover(hit.group,hit.x,hit.y,false); else hideEconomicEventPopover();
    }
    if(annotationMode&&name==="price"&&annotationDraft&&annotationDraft.dragging){ updateAnnotationDraft(ev); return; }
    if(vpMode&&name==="price"&&vpDraft&&vpDraft.dragging){ updateVpDraft(ev); return; }
    if(drag&&chartMode==="heatmap"&&drag.name==="price"&&drag.heat){ const L=PADL,top=10,bottom=30,pw=Math.max(1,r.width-L-AXIS_W),ph=Math.max(1,r.height-top-bottom); heatPan(ev.clientX-drag.x,ev.clientY-drag.y,pw,ph,drag.heat); draw(); scheduleHeatFetch(); return; }
    if(drag){const pw=Math.max(1,r.width-PADL-AXIS_W); const d=Math.round((drag.x-ev.clientX)/pw*barsPerView); start=clamp(drag.start+d,0,maxStart()); if(drag.name==="price")autoYZoom("equity"); if(drag.name===name&&isFinite(drag.lo)&&isFinite(drag.hi)&&drag.hi>drag.lo){ const top=name==="price"?14:12,bottom=name==="price"?34:30; const ph=Math.max(1,r.height-top-bottom); const dy=ev.clientY-drag.y; const shift=dy/ph*(drag.hi-drag.lo); const st=yZoom[name]; st.manual=true; st.lo=drag.lo+shift; st.hi=drag.hi+shift; }} draw();});
  canvas.addEventListener("click",ev=>{ if(name!=="price")return; const r=canvas.getBoundingClientRect(), x=ev.clientX-r.left, y=ev.clientY-r.top; const hit=hitEconomicEventMarker(x,y); if(hit){ pinnedEconEvent=hit.group; showEconomicEventPopover(hit.group,hit.x,hit.y,true); ev.preventDefault(); } else if(pinnedEconEvent){ pinnedEconEvent=null; hideEconomicEventPopover(true); draw(); } });
  canvas.addEventListener("mouseleave",()=>{hover=null; if(!pinnedEconEvent)hideEconomicEventPopover(); draw();});
}
window.addEventListener("mouseup",()=>{ if(annotationDraft)annotationDraft.dragging=false; if(vpDraft)finalizeVpDraft(); drag=null; price.classList.remove("dragging"); equity.classList.remove("dragging"); updateAnnotationUi(); });
splitter.addEventListener("mousedown",ev=>{
  splitDrag={y:ev.clientY,h:equity.getBoundingClientRect().height};
  splitter.classList.add("dragging");
  ev.preventDefault();
});
window.addEventListener("mousemove",ev=>{
  if(!splitDrag)return;
  const total=charts.getBoundingClientRect().height;
  const next=clamp(splitDrag.h-(ev.clientY-splitDrag.y),80,Math.max(80,total-180));
  charts.style.setProperty("--equity-height",`${Math.round(next)}px`);
  resize();
});
window.addEventListener("mouseup",()=>{splitDrag=null; splitter.classList.remove("dragging");});
attach(price,"price"); attach(equity,"equity");
$("centerPrice").onclick=centerCurrentPrice;
$("tradeFirst").onclick=()=>jumpToTrade("first");
$("tradePrev").onclick=()=>jumpToTrade("prev");
$("tradeNext").onclick=()=>jumpToTrade("next");
$("tradeLast").onclick=()=>jumpToTrade("last");
$("modeCandles").onclick=()=>setChartMode("candles");
$("modeFootprint").onclick=()=>setChartMode("footprint");
$("modeHeatmap").onclick=()=>setChartMode("heatmap");
$("heatMetric").onchange=e=>{heatMetric=e.target.value; if(chartMode==="heatmap")fetchHeat(); else draw();};
$("toggleMetrics").onclick=()=>setCardsCollapsed(!cardsCollapsed);
setCardsCollapsed(cardsCollapsed,false);
$("toggleEquity").onclick=()=>setEquityCollapsed(!equityCollapsed);
setEquityCollapsed(equityCollapsed,false);
$("toggleVp").onclick=()=>setVpMode(!vpMode);
function setCrosshair(on,persist=true){
  crosshairOn=!!on;
  const b=$("toggleCross");
  if(b){ b.classList.toggle("active",crosshairOn); b.setAttribute("aria-pressed",String(crosshairOn)); }
  if(persist)writeStoredBool("accelerando.crosshair",crosshairOn);
  draw();
}
$("toggleCross").onclick=()=>setCrosshair(!crosshairOn);
setCrosshair(crosshairOn,false);
$("runBtn").onclick=runBacktest;
$("saveBtn").onclick=async()=>{ const name=$("saveName").value.trim(); if(!name){$("runErr").textContent="Enter a save name";return;} const r=await (await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})})).json(); if(!r.ok){$("runErr").textContent=r.error||"save failed";} else { $("saveName").value=""; refreshRuns(); } };
window.addEventListener("resize",resize);
window.addEventListener("keydown",ev=>{
  const tag=(document.activeElement&&document.activeElement.tagName||"").toLowerCase();
  const editing=tag==="input"||tag==="textarea"||tag==="select";
  if(editing)return;
  if(annotationConfig.enabled&&ev.key.toLowerCase()==="a"){ setAnnotationMode(!annotationMode); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="v"){ setVpMode(!vpMode); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="c"){ setCrosshair(!crosshairOn); ev.preventDefault(); return; }
  if(ev.key==="Escape"){
    if(vpDraft){ vpDraft=null; draw(); ev.preventDefault(); return; }
    if(vpMode){ setVpMode(false); ev.preventDefault(); return; }
    if(annotationMode){ cancelAnnotationDraft(); ev.preventDefault(); }
    return;
  }
  if(!(annotationConfig.enabled&&annotationMode))return;
  if(ev.key>="1"&&ev.key<="9"){ const idx=Number(ev.key)-1, labels=annotationLabels(); if(labels[idx]){ $("annoLabel").value=labels[idx]; if(annotationDraft)annotationDraft.label=labels[idx]; draw(); updateAnnotationUi(); ev.preventDefault(); } return; }
  if(ev.key==="Enter"){ saveAnnotationDraft(); ev.preventDefault(); }
});

async function init(){
  document.body.classList.add("viewer");
  $("status").textContent="result viewer";
  setupAnnotations();
  resize();
  try{ await loadResult(); }
  catch(err){ $("status").textContent="Unable to load result: "+(err&&err.message?err.message:err); }
}
init();
</script>
