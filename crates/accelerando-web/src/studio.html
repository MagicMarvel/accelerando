<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accelerando - backtest studio</title>
<style>
  :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background:#f6f7f9; color:#111827; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
  /* Compact dark header that also hosts the chart controls (trade nav, chart mode,
     panel toggles) so no separate toolbar row eats vertical space. */
  header { padding:6px 12px; background:#0f172a; color:#fff; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  header .home-btn { flex:0 0 auto; display:inline-flex; align-items:center; gap:6px; height:26px; padding:0 10px; color:#e2e8f0; text-decoration:none; font-size:13px; font-weight:700; border:1px solid #334155; border-radius:8px; background:#1e293b; }
  header .home-btn:hover { background:#334155; }
  header .meta-toggle { background:#1e293b; border-color:#334155; color:#cbd5e1; }
  header .meta-toggle:hover { background:#334155; }
  header .rng { margin-left:auto; font-size:12px; color:#94a3b8; white-space:nowrap; }
  header .status { font-size:12px; color:#cbd5e1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:40vw;}
  header .heat-pick { font-size:12px; color:#94a3b8; display:inline-flex; gap:5px; align-items:center; }
  header .heat-pick select { height:26px; background:#1e293b; color:#cbd5e1; border:1px solid #334155; border-radius:6px; font-size:12px; }
  header .bubble-agg { display:none; margin-left:auto; min-width:300px; max-width:500px; flex:1 1 320px; align-items:center; gap:8px; color:#cbd5e1; font-size:12px; white-space:nowrap; }
  header .bubble-agg.visible { display:flex; }
  header .bubble-agg input { appearance:none; flex:1; height:5px; border-radius:4px; outline:0; background:linear-gradient(90deg,#334155,#3b82f6); cursor:pointer; }
  header .bubble-agg input::-webkit-slider-thumb { appearance:none; width:15px; height:15px; border-radius:50%; border:2px solid #dbeafe; background:#2563eb; box-shadow:0 0 0 2px rgba(37,99,235,.3); }
  header .bubble-agg input::-moz-range-thumb { width:13px; height:13px; border-radius:50%; border:2px solid #dbeafe; background:#2563eb; }
  header .bubble-agg output { min-width:26px; color:#93c5fd; text-align:right; font-variant-numeric:tabular-nums; }
  button.tool-toggle { height:26px; padding:0 10px; border-radius:8px; background:#1e293b; border:1px solid #334155; color:#cbd5e1; font-size:12px; }
  button.tool-toggle:hover { background:#334155; }
  button.tool-toggle.active { background:#2563eb; border-color:#2563eb; color:#fff; }
  .main { display:grid; grid-template-columns:360px 1fr; min-height:0; }
  body.viewer .main { grid-template-columns:1fr; }
  body.viewer .side { display:none; }
  .side { border-right:1px solid #e2e8f0; background:#fff; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
  .panel { border:1px solid #e5e7eb; border-radius:10px; background:#fbfcfe; }
  .panel > h3 { margin:0; padding:8px 12px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:#475569; border-bottom:1px solid #eef2f7; }
  .panel .body { padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  .runbar { display:flex; gap:8px; align-items:center; }
  button { border:1px solid #c5ccd6; border-radius:8px; background:#fff; cursor:pointer; font-size:13px; padding:7px 12px; }
  button:hover { background:#eef2f7; }
  button.primary { background:#2563eb; border-color:#2563eb; color:#fff; font-weight:700; }
  button.primary:disabled { background:#94a3b8; border-color:#94a3b8; cursor:not-allowed; }
  .progress { height:10px; border-radius:6px; background:#e5e7eb; overflow:hidden; flex:1; }
  .progress > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#06b6d4,#2563eb); transition:width .15s; }
  .prog-text { font-size:11px; color:#475569; min-height:14px; }
  label.f { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:12px; color:#374151; }
  label.f input, label.f select { width:150px; padding:4px 6px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px; }
  details { border:1px solid #eef2f7; border-radius:8px; }
  details > summary { cursor:pointer; padding:6px 10px; font-size:12px; font-weight:600; color:#334155; }
  details .body { padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  .runs { display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto; }
  .run { display:flex; justify-content:space-between; gap:6px; padding:6px 8px; border:1px solid #eef2f7; border-radius:6px; cursor:pointer; font-size:12px; }
  .run:hover { background:#eff6ff; border-color:#bfdbfe; }
  .run .nm { font-weight:600; }
  .run .mt { color:#64748b; }
  .pos { color:#2563eb; } .neg { color:#d97706; }
  .err { color:#b45309; font-size:12px; }
  /* Flex column instead of a fixed-row grid: the chart area always takes the remaining
     height no matter how many bars (cards, toolbar, replay panel) precede it, and
     position:fixed overlays don't shift the layout. */
  .content { display:flex; flex-direction:column; min-height:0; }
  .content > * { flex:0 0 auto; }
  .content > .chart-area { flex:1 1 0; min-height:0; }
  /* Tool surfaces get a slate tint so the (light) chart plane reads as "the chart". */
  .cards { display:flex; gap:8px; flex-wrap:wrap; padding:8px 14px; background:#e7edf5; border-bottom:1px solid #d3dce8; }
  .cards.collapsed { padding:0; border-bottom:0; }
  .cards.collapsed > * { display:none; }
  .card { min-width:104px; padding:6px 10px; border:1px solid #d3dce8; border-radius:8px; background:#fff; }
  .card .k { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:.4px; }
  .card .v { font-size:16px; font-weight:700; margin-top:2px; }
  .run-meta-backdrop { display:none; position:fixed; inset:0; z-index:49; background:rgba(15,23,42,0.30); }
  .run-meta-backdrop.open { display:block; }
  .run-meta { display:none; position:fixed; z-index:50; left:50%; top:60px; transform:translateX(-50%); width:min(1100px,calc(100vw - 48px)); max-height:calc(100vh - 110px); overflow:auto; background:#fff; border:1px solid #cbd5e1; border-radius:12px; box-shadow:0 18px 48px rgba(15,23,42,0.30); }
  .run-meta.visible { display:block; }
  .run-meta.collapsed { display:none; }
  .run-meta-head { position:sticky; top:0; z-index:1; display:flex; align-items:center; gap:10px; padding:10px 14px; background:#fff; border-bottom:1px solid #eef2f7; }
  .run-meta-head b { font-size:13px; text-transform:uppercase; letter-spacing:.4px; color:#334155; }
  .run-meta-head span { color:#64748b; font-size:12px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .run-meta-head button { height:26px; width:26px; padding:0; border-radius:6px; font-size:13px; line-height:1; }
  .meta-toggle { height:24px; min-width:62px; padding:0 8px; border-radius:6px; font-size:12px; }
  .run-meta-body { display:flex; padding:8px 14px; gap:8px; flex-wrap:wrap; align-items:stretch; }
  .run-meta .meta-head { min-width:180px; padding:6px 8px; border:1px solid #e5e7eb; border-radius:8px; background:#fbfcfe; }
  .run-meta .meta-head b { display:block; font-size:13px; }
  .run-meta .meta-head span { display:block; margin-top:2px; font-size:11px; color:#64748b; }
  .run-meta .meta-group { min-width:220px; max-width:420px; flex:1 1 260px; padding:6px 8px; border:1px solid #eef2f7; border-radius:8px; background:#fbfcfe; }
  .run-meta .meta-title { font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:.4px; font-weight:800; margin-bottom:5px; }
  .run-meta .meta-items { display:flex; flex-wrap:wrap; gap:5px; }
  .run-meta .meta-param { display:inline-flex; gap:4px; max-width:100%; padding:2px 5px; border:1px solid #e5e7eb; border-radius:6px; background:#fff; font-size:11px; }
  .run-meta .meta-param b { color:#475569; font-weight:600; overflow:hidden; text-overflow:ellipsis; }
  .run-meta .meta-param span { font-family:Consolas,"SFMono-Regular",monospace; overflow:hidden; text-overflow:ellipsis; }
  .seg { display:inline-flex; border:1px solid #334155; border-radius:8px; overflow:hidden; background:#1e293b; }
  .seg button { border:0; border-radius:0; height:26px; padding:0 10px; background:transparent; color:#cbd5e1; font-size:12px; }
  .seg button + button { border-left:1px solid #334155; }
  .seg button:hover { background:#334155; }
  .seg button.active { background:#2563eb; color:#fff; }
  .charts { --equity-height:180px; position:relative; display:grid; grid-template-rows:minmax(160px,1fr) 7px minmax(80px,var(--equity-height)); min-height:0; }
  .charts.equity-collapsed { grid-template-rows:minmax(160px,1fr) 0 0; }
  .charts.equity-collapsed .splitter, .charts.equity-collapsed #equity { display:none; }
  .splitter { height:7px; cursor:row-resize; background:#eef2f7; border-top:1px solid #cbd5e1; border-bottom:1px solid #cbd5e1; }
  .splitter:hover, .splitter.dragging { background:#dbeafe; }
  canvas { display:block; width:100%; height:100%; background:#fbfcfe; cursor:grab; }
  canvas.dragging { cursor:grabbing; }
  .chart-area { position:relative; display:grid; grid-template-columns:46px 1fr; min-height:0; }
  .vwap-menu { display:none; position:absolute; z-index:9; min-width:220px; background:#fff; border:1px solid #cbd5e1; border-radius:8px; box-shadow:0 8px 24px rgba(15,23,42,.18); padding:4px; }
  .vwap-menu.visible { display:flex; flex-direction:column; gap:2px; }
  .vwap-menu button { border:0; background:#fff; text-align:left; padding:7px 10px; border-radius:6px; font-size:12.5px; cursor:pointer; }
  .vwap-menu button:hover { background:#eff6ff; }
  .vwap-menu .on { font-weight:700; color:#1d4ed8; }
  .chart-tools { display:flex; flex-direction:column; align-items:center; gap:8px; padding:8px 5px; background:#e7edf5; border-right:1px solid #d3dce8; }
  .chart-tools button { width:34px; height:34px; padding:0; font-size:16px; line-height:1; border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .chart-tools button.active { background:#0f172a; border-color:#0f172a; color:#fff; }
  .chart-tools button.tool-label { font-size:12px; font-weight:800; }
  .anno-tools { display:none; align-items:center; gap:6px; padding:2px 6px; border:1px solid #334155; border-radius:8px; background:#1e293b; }
  .anno-tools.visible { display:inline-flex; }
  .anno-tools select { height:24px; border:1px solid #334155; border-radius:6px; font-size:12px; background:#0f172a; color:#e2e8f0; }
  .anno-tools button { height:24px; padding:0 8px; border-radius:6px; font-size:12px; background:#1e293b; border-color:#334155; color:#cbd5e1; }
  .anno-tools button:hover { background:#334155; }
  .anno-hint { font-size:11px; color:#94a3b8; white-space:nowrap; }
  .chart-legend { position:absolute; left:10px; top:8px; z-index:4; pointer-events:none; font-size:12px; }
  .legend-card { pointer-events:auto; min-width:132px; background:rgba(255,255,255,0.92); border:1px solid rgba(203,213,225,0.75); border-radius:8px; box-shadow:0 1px 6px rgba(15,23,42,0.10); overflow:hidden; user-select:none; }
  .legend-head { display:flex; align-items:center; gap:6px; padding:4px 9px; cursor:pointer; color:#475569; font-weight:700; }
  .legend-head:hover { background:#f1f5f9; }
  .legend-caret { font-size:9px; color:#94a3b8; }
  .legend-row { display:flex; align-items:center; gap:8px; padding:3px 9px; color:#334155; cursor:pointer; }
  .legend-row:hover { background:#f1f5f9; }
  .legend-row .lg-name { flex:1; white-space:nowrap; }
  .legend-row .lg-eye { opacity:0.55; font-size:12px; line-height:1; }
  .legend-row:hover .lg-eye { opacity:1; }
  .legend-row.off { opacity:0.45; }
  .legend-row.off .lg-name { text-decoration:line-through; }
  .annotation-help { display:none; position:absolute; left:16px; bottom:48px; z-index:4; max-width:min(760px,calc(100% - 150px)); padding:7px 9px; border:1px solid #cbd5e1; border-radius:8px; background:rgba(255,255,255,0.94); color:#334155; box-shadow:0 2px 8px rgba(15,23,42,0.12); font-size:12px; line-height:1.35; pointer-events:none; }
  .annotation-help.visible { display:block; }
  .annotation-help b { color:#0f172a; }
  .ff-event-popover { display:none; position:absolute; z-index:6; width:min(380px,calc(100% - 24px)); max-height:min(430px,calc(100% - 24px)); overflow:auto; padding:14px 16px 14px 18px; border-left:4px solid #a855f7; border-radius:8px; background:#fff; color:#111827; box-shadow:0 12px 32px rgba(15,23,42,0.24); font-size:12px; line-height:1.35; }
  .ff-event-popover.visible { display:block; }
  .ff-event-popover .ff-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-weight:800; font-size:15px; }
  .ff-event-popover .ff-bolt { display:inline-flex; width:24px; height:24px; align-items:center; justify-content:center; border:1px solid #a855f7; border-radius:50%; color:#a855f7; font-size:16px; line-height:1; }
  .ff-event-popover .ff-time { color:#64748b; font-size:12px; font-weight:500; }
  .ff-event-popover .ff-item { padding:10px 0; border-top:1px solid #eef2f7; }
  .ff-event-popover .ff-title { font-weight:750; font-size:13px; color:#111827; }
  .empty { display:flex; align-items:center; justify-content:center; height:100%; color:#94a3b8; font-size:14px; }
</style>
</head>
<body class="viewer">
<header>
  <a class="home-btn" href="/" title="Back to home">&#8962; Home</a>
  <span class="seg" aria-label="trade navigation">
    <button id="tradeFirst" title="Jump to first trade">First</button>
    <button id="tradePrev" title="Jump to previous trade">Prev</button>
    <button id="tradeNext" title="Jump to next trade">Next</button>
    <button id="tradeLast" title="Jump to last trade">Last</button>
  </span>
  <span class="seg" aria-label="chart mode">
    <button id="modeChart" class="active" title="Price chart: footprint when zoomed in, candles when zoomed out. Press M for a footprint magnifier.">Chart</button>
    <button id="modeHeatmap" title="L2 heatmap chart">Heatmap</button>
  </span>
  <label class="heat-pick">heat <select id="heatMetric"><option value="total">total</option><option value="bid">bid</option><option value="ask">ask</option></select></label>
  <button id="toggleCvd" class="tool-toggle active" type="button" title="隐藏 CVD 子图" aria-pressed="true" style="display:none;">CVD</button>
  <button id="toggleMetrics" class="tool-toggle active" type="button" title="Hide metrics" aria-pressed="true">Metrics</button>
  <button id="toggleEquity" class="tool-toggle active" type="button" title="Hide equity" aria-pressed="true">Equity</button>
  <button id="toggleRunMeta" class="meta-toggle" type="button" style="display:none;"></button>
  <span id="annoTools" class="anno-tools">
    <select id="annoLabel" title="Annotation label"></select>
    <button id="annoSave" type="button" title="Save current box (Enter)" disabled>Save</button>
    <button id="annoCancel" type="button" title="Cancel current box (Esc)" disabled>Cancel</button>
    <span id="annoHint" class="anno-hint"></span>
  </span>
  <label id="bubbleAggControl" class="bubble-agg" title="低：显示更多独立小成交；高：把邻近成交聚合成大气泡">
    <span>泡泡聚合度</span><span>低</span><input id="bubbleAgg" type="range" min="0" max="100" value="28" step="1"><span>高</span><output id="bubbleAggValue">28</output>
  </label>
  <span class="rng" id="range"></span>
  <span class="status" id="status"></span>
</header>
<div class="main">
  <aside class="side">
    <div class="panel">
      <h3>run</h3>
      <div class="body">
        <div class="runbar">
          <button class="primary" id="runBtn" style="flex:0 0 auto;">Run</button>
          <div class="progress"><i id="progBar"></i></div>
        </div>
        <div class="prog-text" id="progText"></div>
        <div class="err" id="runErr"></div>
        <div class="runbar">
          <input id="saveName" placeholder="Save name..." style="flex:1; padding:6px 8px; border:1px solid #cbd5e1; border-radius:6px; font-size:12px;">
          <button id="saveBtn">Save</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3>saved runs</h3>
      <div class="body"><div class="runs" id="runs"></div></div>
    </div>

    <div class="panel">
      <h3>config</h3>
      <div class="body" id="form"></div>
    </div>
  </aside>

  <section class="content">
    <div class="cards" id="cards"></div>
    <div class="run-meta-backdrop" id="runMetaBackdrop"></div>
    <div class="run-meta" id="runMeta"></div>
    <div class="chart-area">
      <div class="chart-tools">
        <button id="toggleCross" type="button" title="Crosshair (C)" aria-pressed="true">&#10011;</button>
        <button id="centerPrice" type="button" title="Fit visible range to screen" aria-label="Fit visible range to screen">&#9974;</button>
        <button id="toggleVp" class="tool-label" type="button" title="Volume profile (V): drag a bar range; select a profile later to resize, move or Delete it" aria-pressed="false">VP</button>
        <button id="toolHline" type="button" title="Horizontal line (H): click the chart to place one; select it later and press Delete to remove" aria-pressed="false">&#8213;</button>
        <button id="toolRect" type="button" title="Rectangle (R): drag on the chart to draw one; select it later and press Delete to remove" aria-pressed="false">&#9645;</button>
        <button id="toolVwap" class="tool-label" type="button" title="VWAP: daily / weekly / anchored to a bar you pick" aria-pressed="false">VW</button>
        <button id="toggleAnnotate" type="button" title="Toggle annotation mode (A)" aria-pressed="false" style="display:none;">&#9998;</button>
      </div>
      <div class="charts">
        <div id="chartLegend" class="chart-legend"></div>
        <div id="annotationHelp" class="annotation-help"></div>
        <div id="ffEventPopover" class="ff-event-popover"></div>
        <canvas id="price"></canvas>
        <div id="chartSplitter" class="splitter" title="Drag to resize charts"></div>
        <canvas id="equity"></canvas>
      </div>
    </div>
  </section>
</div>
<script>
const COLORS = { up:"#6d6dff", down:"#ff6d6d", buy:"#6d6dff", sell:"#ff6d6d", tradeText:"#ffffff", grid:"#e2e8f0", axis:"#475569" };
// TradingView-style layout: thin left padding, price axis on the right.
const AXIS_W=64, PADL=8;
let SCHEMA=null, CONFIG=null, DATA=null, fps=[], eq=[], trades=[], runSeries=[];
let barsPerView=300, start=0, hover=null, drag=null, splitDrag=null, chartMode="chart", heatMetric="total", poll=null;
// The merged price chart renders footprints once bars are at least this wide, candles below it.
const FOOTPRINT_MIN_XSTEP=32;
let magnifier=false; // M key: ATAS-style footprint lens under the cursor
// Overlay visibility, keyed by category ("bands", "trades", or a marker group). Persisted across
// re-renders so a hidden overlay stays hidden when the result is reloaded.
let overlayState={};
let annotationConfig={enabled:false,labels:[]};
let annotations=[], annotationMode=false, annotationDraft=null, priceScale=null;
let econEventGroups=[], econEventMarkers=[], pinnedEconEvent=null;
// User-drawn volume/delta profiles (Fixed Range Volume Profile, TradingView-style): drag a box on
// the price chart to add one, click an existing one to remove it. Client-side only (computed from
// the already-loaded footprint ladders), not persisted across reloads.
let vpProfiles=[], vpMode=false, vpDraft=null;
// Draft VP data must come from the complete server-side ladders as well. Requests are debounced
// while the pointer moves and aborted when the selected range changes, so a stale/partial profile
// is never presented as the current preview.
let vpDraftTimer=null, vpDraftAbort=null, vpDraftRevision=0;
// The initial result may contain sampled ladders only. Full ladders are filled into `fps` on
// demand for footprint-readable windows; a generation guard discards responses from an old run.
let ladderLoaded=new Set(), ladderPending=new Set(), ladderApiAvailable=true, ladderGeneration=0;
const overlayLabel=cat=>cat==="bands"?"bands":cat==="trades"?"trades":cat==="ff_high_events"?"High events":cat.replace(/_/g," ");
const overlayOn=cat=>overlayState[cat]!==false;
const markerCat=p=>p.group||"markers";
// Line plots group into one overlay toggle per id prefix ("vwap_up" -> "vwap").
const lineCat=p=>String(p.id||"lines").split("_")[0]||"lines";
const volumeProfileCat=p=>(p.id||"").startsWith("entry_vp_")?"entry_vp":"volume_profiles";
const priceBoxCat=p=>p.group||"price_boxes";
let yZoom={price:{manual:false,lo:null,hi:null},equity:{manual:false,lo:null,hi:null}};
const $ = id => document.getElementById(id);
const price=$("price"), pctx=price.getContext("2d");
const equity=$("equity"), ectx=equity.getContext("2d");
const charts=document.querySelector(".charts"), splitter=$("chartSplitter");
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function readStoredBool(key,fallback=false){ try{ const v=localStorage.getItem(key); return v===null?fallback:v==="1"; } catch(_){ return fallback; } }
function writeStoredBool(key,value){ try{ localStorage.setItem(key,value?"1":"0"); } catch(_){} }
let metaCollapsed=readStoredBool("accelerando.runMetaCollapsed",true);
let equityCollapsed=readStoredBool("accelerando.equityCollapsed",false);
let cardsCollapsed=readStoredBool("accelerando.cardsCollapsed",false);
let crosshairOn=readStoredBool("accelerando.crosshair",true);
let legendCollapsed=readStoredBool("accelerando.legendCollapsed",false);
let cvdVisible=readStoredBool("accelerando.heatmapCvd",true);
const fmt=(n,d=2)=>(n===null||n===undefined||!isFinite(n))?"-":Number(n).toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d});
const fmtTs=ns=>new Date(Number(ns)/1e6).toLocaleString();
const fmtAxisTs=ns=>new Date(Number(ns)/1e6).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
// TradingView-style crosshair time tag: weekday + date + time.
const WEEKDAYS_CN=["周日","周一","周二","周三","周四","周五","周六"];
function fmtCrosshairTs(ns){
  const d=new Date(Number(ns)/1e6), pad=n=>String(n).padStart(2,"0");
  return `${WEEKDAYS_CN[d.getDay()]} ${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
const sc=n=>n>=0?"pos":"neg";
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
function fmtParam(v){
  if(v===null||v===undefined)return "-";
  if(typeof v==="number")return Number.isInteger(v)?String(v):fmt(v,4);
  if(typeof v==="boolean")return v?"true":"false";
  return esc(v);
}
function flattenParams(value,prefix="",out=[]){
  if(value===null||value===undefined)return out;
  if(Array.isArray(value)){ value.forEach((item,i)=>flattenParams(item,prefix||String(i+1),out)); return out; }
  if(typeof value==="object"){
    if(value.adapter&&value.params&&typeof value.params==="object"){
      flattenParams(value.params,prefix?`${prefix}.${value.adapter}`:value.adapter,out);
      return out;
    }
    for(const [k,v] of Object.entries(value)){ if(k!=="adapter")flattenParams(v,prefix?`${prefix}.${k}`:k,out); }
    return out;
  }
  out.push({key:prefix,value});
  return out;
}
function groupedParams(params){
  const groups=[];
  for(const item of flattenParams(params||{})){
    const parts=item.key.split(".");
    const name=parts.pop()||item.key;
    const group=parts.join(".")||"params";
    let g=groups.find(x=>x.name===group);
    if(!g){ g={name:group,items:[]}; groups.push(g); }
    g.items.push({name,value:item.value});
  }
  return groups;
}

function resetYZoom(){ yZoom={price:{manual:false,lo:null,hi:null},equity:{manual:false,lo:null,hi:null}}; }
function applyYZoom(name,lo,hi){
  if(!(isFinite(lo)&&isFinite(hi))||lo===hi){lo-=1;hi+=1;}
  const st=yZoom[name];
  if(st.manual&&isFinite(st.lo)&&isFinite(st.hi)&&st.hi>st.lo)return [st.lo,st.hi];
  st.lo=lo; st.hi=hi;
  return [lo,hi];
}
function lockYZoom(name){ const st=yZoom[name]; if(st&&isFinite(st.lo)&&isFinite(st.hi)&&st.hi>st.lo)st.manual=true; }
function autoYZoom(name){ const st=yZoom[name]; if(st)st.manual=false; }
function zoomY(name,factor,frac){
  const st=yZoom[name]; if(!st||st.lo==null||st.hi==null)return;
  const oldLo=st.lo, oldHi=st.hi, oldSpan=oldHi-oldLo; if(!(oldSpan>0))return;
  const nextSpan=clamp(oldSpan/factor,1e-12,1e18);
  const anchor=oldHi-frac*oldSpan;
  const nextLo=anchor-(1-frac)*nextSpan;
  st.manual=true; st.lo=nextLo; st.hi=nextLo+nextSpan;
  draw();
}
function drawTimeAxis(ctx,vis,L,T,pw,ph,W,R,tsKey="ts_last_ns",xStep=pw/Math.max(1,vis.length)){
  if(!vis.length)return;
  ctx.save(); ctx.strokeStyle=COLORS.grid; ctx.fillStyle=COLORS.axis; ctx.font="10px Segoe UI, Arial"; ctx.textAlign="center"; ctx.textBaseline="top";
  const ticks=Math.min(5,vis.length);
  for(let i=0;i<ticks;i++){
    const idx=ticks===1?0:Math.round((vis.length-1)*i/(ticks-1));
    const x=L+(idx+0.5)*xStep;
    const ts=vis[idx][tsKey]??vis[idx].ts_last_ns??vis[idx].ts_ns;
    ctx.beginPath();ctx.moveTo(x,T+ph);ctx.lineTo(x,T+ph+4);ctx.stroke();
    ctx.fillText(fmtAxisTs(ts),x,T+ph+7);
  }
  ctx.restore();
}

function valType(entry){ const r=rangeOf(entry); if(r.kind==="Int")return"int"; if(r.kind==="Float")return"float"; if(r.kind==="Choice")return"str"; return typeof entry.default==="number"?(Number.isInteger(entry.default)?"int":"float"):"str"; }

async function checkProgress(){
  let p; try{ p=await (await fetch("/api/progress")).json(); }catch(e){ return; }
  const bar=$("progBar"), txt=$("progText");
  if(p.pct!=null){ bar.style.width=(p.pct*100).toFixed(1)+"%"; }
  else if(p.running){ bar.style.width="100%"; bar.style.opacity=0.4; }
  const mb=x=>(x/1048576).toFixed(0);
  txt.textContent = p.running
    ? `running... ${p.pct!=null?(p.pct*100).toFixed(1)+"% - ":""}${mb(p.bytes)}/${p.total?mb(p.total):"?"} MB - ${p.footprints} footprints`
    : (p.error? "" : (p.has_result? "done." : "idle"));
  if(p.error){ $("runErr").textContent=p.error; }
  if(!p.running){

    if(p.has_result && !p.error){ bar.style.width="100%"; await loadResult(); refreshRuns(); }

async function loadResult(){
  // Large results are fetched in windows: a full-run JSON can exceed the browser's
  // ~512MB string cap (V8 max string length), so page footprints/equity by cursor
  // and assemble the result client-side before rendering. The first page carries
  // `meta` (metrics/trades/series/etc.); `from` absent on the server keeps the
  // legacy single-payload behavior for /result.json consumers.
  // Cursors advance by a fixed CHUNK, so the next window's request is started
  // BEFORE parsing the current response — network and JSON.parse overlap. The
  // server clamps out-of-range windows to empty, so the one speculative request
  // past the end is cheap.
  const id=typeof globalThis.RUN_ID==="string"?globalThis.RUN_ID:"";
  const base="/api/result?id="+encodeURIComponent(id);
  const CHUNK=60000;
  const st=$("status"), prevStatus=st?st.textContent:"";
  const request=(fpFrom,eqFrom)=>fetch(`${base}&from=${fpFrom}&eq_from=${eqFrom}&count=${CHUNK}`);
  let respPromise=request(0,0), fpFrom=0, eqFrom=0, data=null;
  for(;;){
    const r=await respPromise;
    if(!r.ok) throw new Error(`/api/result: ${r.status}`);
    const nextFpFrom=fpFrom+CHUNK, nextEqFrom=eqFrom+CHUNK;
    const speculative=request(nextFpFrom,nextEqFrom);
    const page=await r.json();
    if(page&&page.error) throw new Error(page.error);
    if(!data){ data=Object.assign({},page.meta||{}); data.footprints=[]; data.equity=[]; }
    for(const fp of page.footprints||[]) data.footprints.push(fp);
    for(const eq of page.equity||[]) data.equity.push(eq);
    if(st) st.textContent=`loading result ${data.footprints.length}/${page.total_fps} bars`;
    const done=data.footprints.length>=page.total_fps&&data.equity.length>=page.total_eq;
    const stalled=!(page.footprints||[]).length&&!(page.equity||[]).length;
    if(done||stalled){ speculative.catch(()=>{}); break; }
    respPromise=speculative; fpFrom=nextFpFrom; eqFrom=nextEqFrom;
  }
  if(st) st.textContent=prevStatus;
  renderResult(data);
  await loadAnnotations();
}

// ---------- chart rendering ----------
function renderResult(data){
  // A manual-replay session re-fetches this same run on every step/order/drag, so only
  // snap the view (bars-per-page, x scroll position, y zoom) back to the auto-fit default
  // on the first load; otherwise a user's manual pan/zoom would get wiped out by every
  // subsequent update (most jarringly right as an SL/TP drag completes).
  const isReplay=data.replay!=null, firstLoad=fps.length===0;
  DATA=data; fps=data.footprints||[]; eq=data.equity||[]; trades=data.trades||[]; runSeries=data.series||[];
  ladderGeneration++; ladderLoaded=new Set(); ladderPending=new Set(); ladderApiAvailable=true;
  for(let i=0;i<fps.length;i++){ if((fps[i].ladder||[]).length)ladderLoaded.add(i); }
  pinnedEconEvent=null; econEventMarkers=[]; hideEconomicEventPopover(true);
  heatView=null; heatData=null; heatImg=null; // reset zoomable heatmap window for the new run
  for(const t of trades){ t._ei=idxForEntryTs(t.entry_ts_ns); t._xi=idxForTs(t.exit_ts_ns); }
  econEventGroups=economicEventGroupsFromFootprints();
  renderCards(data.metrics);
  renderRunMeta();
  buildOverlayToggles();
  if(!isReplay||firstLoad){
    barsPerView=Math.min(300,Math.max(20,fps.length)); start=Math.max(0,fps.length-barsPerView);
    resetYZoom();
  } else {
    barsPerView=Math.min(barsPerView,Math.max(1,fps.length));
    start=clamp(start,0,maxStart());
  }
  resize();
}
// Collect the overlay categories actually present in the loaded result, in a stable order:
// background bands, then marker groups (from indicators/strategies), then trade positions.
function overlayCategories(){
  let hasBands=false; const markerGroups=new Set();
  for(const b of fps){ for(const p of (b.plots||[])){
    if(p.kind==="BackgroundBand")hasBands=true;
    else if(p.kind==="Marker"||p.kind==="MarkerAt")markerGroups.add(markerCat(p));
    else if(p.kind==="Line")markerGroups.add(lineCat(p));
    else if(p.kind==="VolumeProfile")markerGroups.add(volumeProfileCat(p));
    else if(p.kind==="PriceBox")markerGroups.add(priceBoxCat(p));
  } }
  for(const s of runSeries)markerGroups.add(lineCat(s));
  const cats=[];
  if(hasBands)cats.push("bands");
  for(const g of [...markerGroups].sort())cats.push(g);
  if(trades.length)cats.push("trades");
  return cats;
}
function defaultOverlayState(cat){
  const strategy=typeof RUN_STRATEGY==="string"?RUN_STRATEGY:"";
  if(strategy==="delta_regime") return cat!=="big_trades";
  if(strategy==="big_trade_regime") return cat!=="imbalance";
  return true;
}
// TradingView-style legend card in the chart's top-left corner: a collapsible list with
// one row per overlay; clicking a row (or its eye) shows/hides that overlay.
function buildOverlayToggles(){
  const host=$("chartLegend"); if(!host)return;
  host.innerHTML="";
  const cats=overlayCategories();
  if(!cats.length)return;
  for(const cat of cats){ if(!(cat in overlayState))overlayState[cat]=defaultOverlayState(cat); }
  const card=document.createElement("div"); card.className="legend-card";
  const hiddenCount=cats.filter(cat=>!overlayOn(cat)).length;
  const head=document.createElement("div"); head.className="legend-head";
  head.innerHTML=`<span class="legend-caret">${legendCollapsed?"&#9654;":"&#9660;"}</span><span>overlays${legendCollapsed?` (${cats.length}${hiddenCount?`, ${hiddenCount} off`:""})`:""}</span>`;
  head.title=legendCollapsed?"Expand overlay list":"Collapse overlay list";
  head.onclick=()=>{ legendCollapsed=!legendCollapsed; writeStoredBool("accelerando.legendCollapsed",legendCollapsed); buildOverlayToggles(); };
  card.append(head);
  if(!legendCollapsed){
    for(const cat of cats){
      const on=overlayOn(cat);
      const row=document.createElement("div");
      row.className="legend-row"+(on?"":" off");
      row.title=(on?"Hide ":"Show ")+overlayLabel(cat);
      row.innerHTML=`<span class="lg-name">${esc(overlayLabel(cat))}</span><span class="lg-eye">${on?"&#128065;":"&#8856;"}</span>`;
      row.onclick=()=>{ overlayState[cat]=!on; buildOverlayToggles(); draw(); };
      card.append(row);
    }
  }
  host.append(card);
}
function idxForTs(ns){ const x=Number(ns); let lo=0,hi=fps.length-1,best=0; while(lo<=hi){const m=(lo+hi)>>1; if(Number(fps[m].ts_last_ns)<=x){best=m;lo=m+1;}else hi=m-1;} return best; }
function idxForEntryTs(ns){
  const x=Number(ns); let lo=0,hi=fps.length-1,best=0;
  while(lo<=hi){ const m=(lo+hi)>>1; if(Number(fps[m].ts_first_ns)<=x){best=m;lo=m+1;} else hi=m-1; }
  if(fps[best] && x<=Number(fps[best].ts_last_ns)) return best;
  return idxForTs(ns);
}
function economicMarkerPlots(b){
  return (b.plots||[]).filter(p=>p.kind==="Marker"&&markerCat(p)==="ff_high_events");
}
function economicEventLines(text){
  return String(text||"").split(/\n|\s*\|\|\s*/).map(s=>s.trim()).filter(Boolean);
}
function economicEventGroupsFromFootprints(){
  const groups=[];
  for(let i=0;i<fps.length;i++){
    const b=fps[i], plots=economicMarkerPlots(b);
    if(!plots.length)continue;
    const events=[];
    for(const p of plots){
      const lines=economicEventLines(p.text);
      if(lines.length)events.push(...lines.map(line=>({title:line,color:p.color||"#a855f7"})));
      else events.push({title:"High-impact event",color:p.color||"#a855f7"});
    }
    groups.push({idx:i,ts_ms:Number(b.ts_last_ns)/1e6,events});
  }
  return groups;
}
function economicEventTime(group){
  return new Date(group.ts_ms).toLocaleString([], {month:"short", day:"2-digit", hour:"2-digit", minute:"2-digit"});
}
function showEconomicEventPopover(group,x,y,pinned=false){
  const pop=$("ffEventPopover"); if(!pop||!group)return;
  const count=group.events.length;
  pop.innerHTML=`<div class="ff-head"><span class="ff-bolt">&#9889;</span><div><div>High-impact events${count>1?` (${count})`:""}</div><div class="ff-time">${esc(economicEventTime(group))}</div></div></div>`+
    group.events.map(ev=>`<div class="ff-item"><div class="ff-title">${esc(ev.title)}</div></div>`).join("");
  pop.classList.add("visible");

  // server's 2000-bar safety cap.

const MAG_W=460, MAG_H=340, MAG_MIN_LEVEL_PX=12;
function drawMagnifier(ctx,W,R){
  if(!hover||hover.canvas!=="price"||!priceScale||!fps.length)return;
  const {s,e,L,T,pw,ph,xStep}=priceScale;
  const mx=hover.x,my=hover.y;
  if(mx<L||mx>L+pw||my<T||my>T+ph)return;
  const ci=clamp(Math.floor((mx-L)/xStep),0,Math.max(0,e-s-1))+s;
  const nBars=Math.max(1,Math.round(MAG_W/110));
  const b0=clamp(ci-(nBars>>1),0,Math.max(0,fps.length-nBars));
  const bars=fps.slice(b0,b0+nBars);
  if(!bars.length)return;
  const tick=tickSizeFor(bars);
  // Price window: the lens bars' full range, but capped so one tick level stays readable;
  // when capped, center the window on the price under the cursor.
  let lo=Infinity,hi=-Infinity;
  for(const b of bars){ lo=Math.min(lo,b.low); hi=Math.max(hi,b.high); }

  ctx.shadowColor="transparent";
  ctx.strokeStyle="#334155"; ctx.lineWidth=1.5; ctx.strokeRect(lx,ly,MAG_W,MAG_H);
  ctx.beginPath(); ctx.rect(lx+1,ly+1,MAG_W-2,MAG_H-2); ctx.clip();
  const yy=p=>ly+innerT+(hi-p)/Math.max(1e-9,hi-lo)*innerH;
  drawFootprints(ctx,bars,lx,ly+innerT,innerH,MAG_W/bars.length,yy,tick);

  const hx=lx+(ci-b0)*(MAG_W/bars.length);

  ctx.strokeRect(hx,ly+innerT,MAG_W/bars.length,innerH);

}

      axisPriceTag(ectx,W,R,hover.y,"$"+vv.toFixed(0),"#334155");
    }
    ectx.restore();
  }
}
function draw(){ drawPrice(); if(!equityCollapsed)drawEquity(); }

function attach(canvas,name){
  canvas.addEventListener("wheel",ev=>{ev.preventDefault(); const r=canvas.getBoundingClientRect(); const x=ev.clientX-r.left;
    if(chartMode==="heatmap"&&name==="price"&&heatView){ const L=PADL,top=10,bottom=30,pw=Math.max(1,r.width-L-AXIS_W),ph=Math.max(1,r.height-top-bottom),factor=ev.deltaY<0?0.82:1.22; if(ev.shiftKey||x>r.width-AXIS_W){ heatZoomPrice(factor,clamp((ev.clientY-r.top-top)/ph,0,1)); } else { heatZoomTime(factor,clamp((x-L)/pw,0,1)); } draw(); scheduleHeatFetch(); return; }
    if(ev.shiftKey||x>r.width-AXIS_W){ const top=name==="price"?14:12,bottom=name==="price"?34:30; const frac=clamp((ev.clientY-r.top-top)/Math.max(1,r.height-top-bottom),0,1); zoomY(name,ev.deltaY<0?1.18:1/1.18,frac); } else { const ratio=clamp((x-PADL)/Math.max(1,r.width-PADL-AXIS_W),0,1); setBarsPerView(barsPerView*(ev.deltaY<0?0.82:1.22),ratio); }},{passive:false});
  canvas.addEventListener("mousedown",ev=>{
    lastDown={x:ev.clientX,y:ev.clientY};
    // TradingView-style axis scaling: drag the right price axis vertically or the bottom
    // time axis horizontally to zoom instead of panning.
    const r=canvas.getBoundingClientRect(), mx=ev.clientX-r.left, my=ev.clientY-r.top;
    const bottomH=(name==="price"&&chartMode!=="heatmap")?34:30;
    const axis=mx>r.width-AXIS_W?"y":(my>r.height-bottomH?"x":null);
    if(axis&&ev.button===0){
      if(axis==="y")lockYZoom(name);
      const st=yZoom[name];
      drag={axis,name,x:ev.clientX,y:ev.clientY,start,bpv:barsPerView,lo:st?.lo,hi:st?.hi,heat:(chartMode==="heatmap"&&name==="price"&&heatView)?{t0:heatView.t0,t1:heatView.t1,pmin:heatView.pmin,pmax:heatView.pmax}:null};
      canvas.classList.add("dragging"); ev.preventDefault(); return;
    }
    if(drawTool&&name==="price"&&chartMode!=="heatmap"&&ev.button===0){ startDrawTool(ev); return; } if(annotationMode&&name==="price"&&chartMode!=="heatmap"&&ev.button===0){ startAnnotationDraft(ev); return; } if(vpMode&&name==="price"&&chartMode!=="heatmap"&&ev.button===0){ startVpDraft(ev); return; }
    if(name==="price"&&chartMode!=="heatmap"&&ev.button===0&&!drawTool&&!annotationMode&&!vpMode){
      const h=shapeHandleAt(ev);
      if(h){ shapeDrag=h; selectedShape={kind:h.type.startsWith("vp")?"vp":"drawing",obj:h.obj}; draw(); ev.preventDefault(); return; }
    }
    lockYZoom(name); const st=yZoom[name]; drag={x:ev.clientX,y:ev.clientY,start,name,lo:st?.lo,hi:st?.hi,heat:(chartMode==="heatmap"&&heatView)?{t0:heatView.t0,t1:heatView.t1,pmin:heatView.pmin,pmax:heatView.pmax}:null}; canvas.classList.add("dragging");});
  canvas.addEventListener("mousemove",ev=>{const r=canvas.getBoundingClientRect(); hover={canvas:name,x:ev.clientX-r.left,y:ev.clientY-r.top};
    if(!drag&&!shapeDrag){
      const bottomH=(name==="price"&&chartMode!=="heatmap")?34:30;
      let cur=hover.x>r.width-AXIS_W?"ns-resize":(hover.y>r.height-bottomH?"ew-resize":"");
      if(!cur){
        if(drawTool)cur="crosshair";
        else if(name==="price"&&!annotationMode&&!vpMode&&chartMode!=="heatmap"){
          cur=shapeHandleCursor(shapeHandleAt(ev))||(shapeAt(ev)?"pointer":"");
        }
      }
      canvas.style.cursor=cur;
    }
    if(drag&&drag.axis){
      if(drag.axis==="y"){
        const factor=Math.exp((ev.clientY-drag.y)/250);
        if(chartMode==="heatmap"&&drag.name==="price"&&drag.heat&&heatView){
          const c=(drag.heat.pmax+drag.heat.pmin)/2, span=Math.max(0.5,(drag.heat.pmax-drag.heat.pmin)*factor);
          heatView.pmin=c-span/2; heatView.pmax=c+span/2; draw(); scheduleHeatFetch(); return;
        }
        if(isFinite(drag.lo)&&isFinite(drag.hi)&&drag.hi>drag.lo){
          const st=yZoom[drag.name], c=(drag.hi+drag.lo)/2, span=Math.max(1e-12,(drag.hi-drag.lo)*factor);
          st.manual=true; st.lo=c-span/2; st.hi=c+span/2;
        }
        draw(); return;
      }
      // Drag left = zoom in (bars widen), drag right = zoom out, matching TradingView.
      const factor=Math.exp((ev.clientX-drag.x)/250);
      if(chartMode==="heatmap"&&drag.name==="price"&&drag.heat&&heatView){
        const c=(drag.heat.t0+drag.heat.t1)/2, span=Math.max(1,(drag.heat.t1-drag.heat.t0)*factor);
        heatView.t0=c-span/2; heatView.t1=c+span/2; draw(); scheduleHeatFetch(); return;
      }
      const end=drag.start+drag.bpv;
      barsPerView=Math.round(clamp(drag.bpv*factor,1,Math.max(1,fps.length)));
      start=clamp(end-barsPerView,0,maxStart());
      autoYZoom("equity");
      draw(); return;
    }
    if(name==="price"&&!pinnedEconEvent){
      const hit=hitEconomicEventMarker(hover.x,hover.y);
      if(hit)showEconomicEventPopover(hit.group,hit.x,hit.y,false); else hideEconomicEventPopover();
    }
    if(name==="price"&&shapeDrag){ updateShapeDrag(ev); return; }
    if(name==="price"&&drawDraft&&drawDraft.dragging){ updateDrawDraft(ev); return; }
    if(annotationMode&&name==="price"&&annotationDraft&&annotationDraft.dragging){ updateAnnotationDraft(ev); return; }
    if(vpMode&&name==="price"&&vpDraft&&vpDraft.dragging){ updateVpDraft(ev); return; }
    if(drag&&chartMode==="heatmap"&&drag.name==="price"&&drag.heat){ const L=PADL,top=10,bottom=30,pw=Math.max(1,r.width-L-AXIS_W),ph=Math.max(1,r.height-top-bottom); heatPan(ev.clientX-drag.x,ev.clientY-drag.y,pw,ph,drag.heat); draw(); scheduleHeatFetch(); return; }
    if(drag){const pw=Math.max(1,r.width-PADL-AXIS_W); const d=Math.round((drag.x-ev.clientX)/pw*barsPerView); start=clamp(drag.start+d,0,maxStart()); if(drag.name==="price")autoYZoom("equity"); if(drag.name===name&&isFinite(drag.lo)&&isFinite(drag.hi)&&drag.hi>drag.lo){ const top=name==="price"?14:12,bottom=name==="price"?34:30; const ph=Math.max(1,r.height-top-bottom); const dy=ev.clientY-drag.y; const shift=dy/ph*(drag.hi-drag.lo); const st=yZoom[name]; st.manual=true; st.lo=drag.lo+shift; st.hi=drag.hi+shift; }} draw();});
  canvas.addEventListener("dblclick",ev=>{
    const r=canvas.getBoundingClientRect(), mx=ev.clientX-r.left;
    if(mx>r.width-AXIS_W){
      if(chartMode==="heatmap"&&name==="price"){ initHeatView(); draw(); scheduleHeatFetch(); }
      else { autoYZoom(name); draw(); }
      ev.preventDefault();
    }
  });
  canvas.addEventListener("click",ev=>{
    if(name!=="price")return;
    const r=canvas.getBoundingClientRect(), x=ev.clientX-r.left, y=ev.clientY-r.top;
    const hit=hitEconomicEventMarker(x,y);
    if(hit){ pinnedEconEvent=hit.group; showEconomicEventPopover(hit.group,hit.x,hit.y,true); ev.preventDefault(); return; }
    if(pinnedEconEvent){ pinnedEconEvent=null; hideEconomicEventPopover(true); draw(); }
    // A plain click (not the tail of a pan) selects the drawing/annotation under the
    // cursor; clicking empty chart deselects. Delete removes the selection.
    if(lastDown&&(Math.abs(ev.clientX-lastDown.x)>4||Math.abs(ev.clientY-lastDown.y)>4))return;
    if(drawTool||annotationMode||vpMode||chartMode==="heatmap")return;
    const shape=shapeAt(ev);
    if(shape||selectedShape){ selectedShape=shape; draw(); }
  });
  canvas.addEventListener("mouseleave",()=>{hover=null; if(!pinnedEconEvent)hideEconomicEventPopover(); draw();});
}
window.addEventListener("mouseup",()=>{ if(annotationDraft)annotationDraft.dragging=false; if(vpDraft)finalizeVpDraft(); if(drawDraft)finalizeDrawDraft(); if(shapeDrag)finalizeShapeDrag(); drag=null; price.classList.remove("dragging"); equity.classList.remove("dragging"); updateAnnotationUi(); });
splitter.addEventListener("mousedown",ev=>{
  splitDrag={y:ev.clientY,h:equity.getBoundingClientRect().height};

window.addEventListener("mousemove",ev=>{

// Rebuild canvas backing stores whenever the chart area's CSS size changes (toolbar wrapping,

window.addEventListener("resize",resize);
window.addEventListener("keydown",ev=>{
  const tag=(document.activeElement&&document.activeElement.tagName||"").toLowerCase();
  const editing=tag==="input"||tag==="textarea"||tag==="select";
  if(editing)return;
  if(annotationConfig.enabled&&ev.key.toLowerCase()==="a"){ setAnnotationMode(!annotationMode); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="v"){ setVpMode(!vpMode); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="c"){ setCrosshair(!crosshairOn); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="h"){ setDrawTool("hline"); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="r"){ setDrawTool("rect"); ev.preventDefault(); return; }
  if(ev.key.toLowerCase()==="m"){ magnifier=!magnifier; draw(); ev.preventDefault(); return; }
  if(ev.key==="Delete"||ev.key==="Backspace"){
    if(selectedShape){ deleteSelectedShape(); ev.preventDefault(); }
    return;
  }
  if(ev.key==="Escape"){
    if(magnifier){ magnifier=false; draw(); ev.preventDefault(); return; }
    const rm=$("runMeta");
    if(rm&&rm.classList.contains("visible")&&!metaCollapsed){ setMetaCollapsed(true); ev.preventDefault(); return; }
    const vm=$("vwapMenu");
    if(vm&&vm.classList.contains("visible")){ vm.classList.remove("visible"); ev.preventDefault(); return; }
    if(drawDraft||drawTool){ drawDraft=null; setDrawTool(null); ev.preventDefault(); return; }
    if(selectedShape){ selectedShape=null; draw(); ev.preventDefault(); return; }
    if(vpDraft){ cancelVpDraftPreview(); vpDraft=null; draw(); ev.preventDefault(); return; }
    if(vpMode){ setVpMode(false); ev.preventDefault(); return; }
    if(annotationMode){ cancelAnnotationDraft(); ev.preventDefault(); }
    return;
  }
  if(!(annotationConfig.enabled&&annotationMode))return;
  if(ev.key>="1"&&ev.key<="9"){ const idx=Number(ev.key)-1, labels=annotationLabels(); if(labels[idx]){ $("annoLabel").value=labels[idx]; if(annotationDraft)annotationDraft.label=labels[idx]; draw(); updateAnnotationUi(); ev.preventDefault(); } return; }
  if(ev.key==="Enter"){ saveAnnotationDraft(); ev.preventDefault(); }
});
